    function ColorRgbPicker({ val, onSet, dirty, onReset }) {

    function slideImgSrc(slide) {
      if (!slide) return null;
      if (slide.imageData) return `data:image/png;base64,${slide.imageData}`;
      if (slide.imageUrl) {

    function hasSlideImage(slide) {
      return !!(slide && (slide.imageData || slide.imageUrl));
    }
    async function b64ToCompressedBlob(b64) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob((blob) => resolve(blob), 'image/jpeg', IMG_QUALITY);
        };
        img.onerror = () => resolve(null);
        img.src = `data:image/png;base64,${b64}`;
      });
    }
    async function uploadSlideImage(b64, userId, carouselId, slideIdx) {
      try {
        const blob = await b64ToCompressedBlob(b64);
        if (!blob) throw new Error('Falha ao comprimir imagem');
        const path = `${userId}/${carouselId}/slide-${slideIdx}.jpg`;
        const version = Date.now();
        const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, blob, { upsert: true, contentType: 'image/jpeg', cacheControl: '31536000' });
        if (error) throw error;
        const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        return { url: data.publicUrl, version };
      } catch (e) {
        console.warn('Erro ao subir imagem para Storage:', e.message);
        return null;
      }
    }
    async function listCarouselFiles(userId, carouselId) {
      try {
        const { data, error } = await sb.storage.from(STORAGE_BUCKET).list(`${userId}/${carouselId}`, { limit: 200 });
        if (error) throw error;
        return (data || []).map(f => `${userId}/${carouselId}/${f.name}`);
      } catch (e) {
        console.warn('Erro ao listar arquivos do Storage:', e.message);
        return [];
      }
    }
    async function removeStorageFiles(paths) {
      if (!paths || !paths.length) return;
      try {
        const { error } = await sb.storage.from(STORAGE_BUCKET).remove(paths);
        if (error) throw error;
      } catch (e) {
        console.warn('Erro ao remover arquivos do Storage:', e.message);

    async function uploadClientLogo(b64OrDataUrl, ownerId) {
      try {
        const b64 = b64OrDataUrl.replace(/^data:image\/[^;]+;base64,/, '');
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        const blob = new Blob([bytes], { type: 'image/png' });
        const path = `${ownerId}/_logos/logo.png`;
        const version = Date.now();
        const { error } = await sb.storage.from(STORAGE_BUCKET).upload(path, blob, { upsert: true, contentType: 'image/png', cacheControl: '31536000' });
        if (error) throw error;
        const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        return `${data.publicUrl}?v=${version}`;
      } catch (e) {
        console.warn('Erro ao subir logo:', e.message);
        return null;
      }

    function computeLogoPos(slide, SW, SH, logoNaturalW, logoNaturalH) {
      const sizePct = Math.max(5, Math.min(80, slide.logoSize || 25));
      const w = SW * (sizePct / 100);
      const h = w * (logoNaturalH / logoNaturalW);
      let lx, ly;
      if (slide.logoX != null || slide.logoY != null) {
        lx = slide.logoX ?? 50;
        ly = slide.logoY ?? 90;
      } else {
        const pos = slide.logoPosition || 'bc';
        const v = pos[0], h2 = pos[1];
        lx = h2 === 'l' ? 8 : h2 === 'r' ? 92 : 50;
        ly = v === 't' ? 8 : v === 'b' ? 92 : 50;
      }
      const x = SW * lx / 100 - w / 2;
      const y = SH * ly / 100 - h / 2;
      return { x, y, w, h };

    /* ── IMAGE PROMPT COM COMPOSIÇÃO POR LAYOUT ── */
    function buildImagePrompt(slide) {
      const base = slide.prompt_imagem || '';

      const layout = slide.layout || 'inline';

      }
      // inline e texto — composição padrão editorial funciona bem
      return base + ' Composição centralizada, enquadramento equilibrado, fotografia editorial de alta qualidade.';
    }

    /* ── GEMINI IMAGE GENERATION ── */
    async function generateImage(prompt, fotoBase64 = null) {
      const model = 'gemini-3.1-flash-image-preview';
      const parts = fotoBase64
        ? [{ inlineData: { mimeType: 'image/jpeg', data: fotoBase64 } },
           { text: prompt + ' Integre o rosto desta pessoa à cena de forma natural e editorial, como se ela fosse a protagonista da foto.' }]
        : [{ text: prompt }];
      const res = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          payload: {
            contents: [{ parts }],
            generationConfig: { responseModalities: ['IMAGE'] }
          }
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `Gemini ${res.status}`); }
      const data = await res.json();
      const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
      if (!part) throw new Error('Gemini não retornou imagem');
      return part.inlineData.data;
    }

        : `Você é especialista em criação de carrosseis de Instagram para médicas especialistas em saúde da mulher no Brasil.

      if (formato === 'virada') {

Slide 1 (CAPA): headline que nomeia o EVENTO emocional específico do tema (ex: "Deu positivo. E agora?"). destaque = palavra do evento em caixa alta (ex: POSITIVO, DIAGNÓSTICO, ATRASOU). subtitulo = promessa do carrossel em até 8 palavras.
Slide 2: validação emocional pura. A paciente não está sozinha nesse sentimento. Sem conselho ainda. Máx 40 palavras.
Slide 3 (título obrigatório): dado científico real que mostra urgência de agir. Estatística ou estudo. Máx 50 palavras.
Slides 4, 5, 6, 7, 8: PASSO 1 a PASSO 5. Cada slide = título curto "Passo N: [ação]" + texto explicando o passo. As ações devem ser CONCRETAS e IMEDIATAS (o que fazer nas próximas 48-72h após o evento). Não são dicas genéricas de saúde. São ordens diretas do momento. Máx 45 palavras por slide.
Slide 9 (título obrigatório "Quem te guia nessa jornada" ou similar): apresentação da médica como guia específico para esse evento. Credenciais relevantes ao tema. Máx 50 palavras.
Slide 10 (CTA): palavra-gatilho em caixa alta + lead magnet CONCRETO relacionado ao evento (ex: "guia do primeiro trimestre", "protocolo de ácido fólico", "checklist do diagnóstico"). Máx 12 palavras no texto.`;
      }
      const lines = ['ESTRUTURA DOS SLIDES:'];
      lines.push('Slide 1 (CAPA): gancho emocional forte, headline de impacto, palavra destaque em caixa alta');
      lines.push('Slide 2: validar a dor da paciente ("você não está sozinha")');
      if (n >= 8) lines.push('Slide 3: ampliar o problema com dado científico ou estatística');
      const mid = n <= 5 ? '3-4' : n <= 8 ? '4-7' : '4-8';
      lines.push(`Slides ${mid}: conteúdo com 1 ideia por slide, linguagem acessível, sem jargão excessivo — título máx 6 palavras, texto máx 45 palavras`);
      if (n >= 8) lines.push(`Slide ${n-1}: autoridade da médica + credenciais relevantes`);
      lines.push(`Slide ${n} (CTA): palavra-gatilho para DM bot + benefício concreto de responder`);
      return lines.join('\n');
    }

    /* ── CANVAS EXPORT ── */
    function measureCSSLines(text, maxWidth, fontWeight, fontSize, fontFamily, letterSpacing) {
      if (!text) return [];
      const lines = [];
      const div = document.createElement('div');
      div.style.position = 'absolute';
      div.style.top = '-9999px';
      div.style.left = '-9999px';
      div.style.width = maxWidth + 'px';
      div.style.fontFamily = `"${fontFamily}", "Sora", sans-serif`;
      div.style.fontWeight = String(fontWeight);
      div.style.fontSize = fontSize + 'px';
      div.style.letterSpacing = letterSpacing || '0px';
      div.style.lineHeight = '1';
      div.style.whiteSpace = 'pre-wrap';
      div.style.overflowWrap = 'normal';
      div.style.wordBreak = 'normal';
      div.style.wordWrap = 'normal';
      div.style.padding = '0';
      div.style.margin = '0';
      div.style.border = '0';
      document.body.appendChild(div);
      try {
        for (const para of text.split('\n')) {
          if (!para) { lines.push(''); continue; }
          div.textContent = para;
          const textNode = div.firstChild;
          const range = document.createRange();
          range.setStart(textNode, 0);
          range.setEnd(textNode, para.length);
          const rects = range.getClientRects();
          if (window.__DEBUG_WRAP) console.log('[wrap]', JSON.stringify({text: para.slice(0, 50), fontSize, fontFamily, maxWidth, rectsCount: rects.length, tops: Array.from(rects).map(r => Math.round(r.top))}));
          if (rects.length <= 1) { lines.push(para); continue; }
          let prevEnd = 0;
          for (let i = 0; i < rects.length; i++) {
            const rect = rects[i];
            let endIdx;
            if (i === rects.length - 1) {
              endIdx = para.length;
            } else {
              let lo = prevEnd + 1, hi = para.length;
              while (lo < hi) {
                const mid = (lo + hi + 1) >> 1;
                range.setStart(textNode, mid - 1);
                range.setEnd(textNode, mid);
                const r = range.getBoundingClientRect();
                if (Math.abs(r.top - rect.top) < 2) lo = mid;
                else hi = mid - 1;
              }
              endIdx = lo;
            }
            lines.push(para.substring(prevEnd, endIdx).trimEnd());
            prevEnd = endIdx;
          }
        }
      } finally {
        document.body.removeChild(div);
      }
      return lines;
    }

    function drawCSSWrapped(ctx, text, x, y, maxW, lh, fontWeight, fontSize, fontFamily, letterSpacing) {
      if (!text) return y;
      const lines = measureCSSLines(text, maxW, fontWeight, fontSize, fontFamily, letterSpacing);
      let cy = y;
      for (const line of lines) {
        if (line && cy < SH) ctx.fillText(line, x, cy);
        cy += lh;
      }
      return cy;
    }

    function wrapText(ctx, text, x, y, maxW, lh) {
      if (!text) return y;
      let cy = y;
      for (const para of text.split('\n')) {
        if (!para.trim()) { cy += lh; continue; }
        const words = para.split(' ');
        let line = '';
        for (let i = 0; i < words.length; i++) {
          const test = line + words[i] + ' ';
          if (ctx.measureText(test).width > maxW && i > 0) {
            if (cy < SH) ctx.fillText(line.trimEnd(), x, cy);
            line = words[i] + ' ';
            cy += lh;
          } else { line = test; }
        }
        if (line.trim() && cy < SH) ctx.fillText(line.trimEnd(), x, cy);
        cy += lh;
      }
      return cy;
    }

    function buildImgFilter(slide) {
      const b = slide.imgBrightness ?? 100;
      const c = slide.imgContrast   ?? 100;
      const s = slide.imgSaturate   ?? 100;
      const h = slide.imgHue        ?? 0;
      const parts = [];
      if (b !== 100) parts.push(`brightness(${b/100})`);
      if (c !== 100) parts.push(`contrast(${c/100})`);
      if (s !== 100) parts.push(`saturate(${s/100})`);
      if (h !== 0)   parts.push(`hue-rotate(${h}deg)`);
      return parts.join(' ');
    }

    function adaptFs(text, max, min) {
      if (!text) return max;
      if (text.length > 60) return min;
      if (text.length > 35) return Math.round((max + min) / 2);
      return max;
    }

    async function drawImage(ctx, src, scale, offsetY, filter) {
      return new Promise(resolve => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          if (filter) ctx.filter = filter;
          const s = scale || 1;
          const oy = offsetY || 0;
          if (s !== 1 || oy !== 0) {
            const drawW = SW * s;
            const drawH = SH * s;
            const offsetYPct = (50 + oy) / 100;
            const drawX = (SW - drawW) / 2;
            const drawY = (SH - drawH) * offsetYPct;
            ctx.drawImage(img, drawX, drawY, drawW, drawH);
          } else {
            ctx.drawImage(img, 0, 0, SW, SH);
          }
          if (filter) ctx.filter = 'none';
          resolve();
        };
        img.onerror = resolve;
        img.src = src;
      });
    }

    async function renderToCanvas(slide, client) {
      await document.fonts.ready;
      const canvas = document.createElement('canvas');
      canvas.width = SW; canvas.height = SH;
      const ctx = canvas.getContext('2d');
      const cp = slide.accentColor || client.corPrimaria || ORANGE;
      const cs = client.corSecundaria || DARK;
      const font = client.fonte || 'Sora';
      const PAD = 90;

      let preloadedLogo = null;
      let logoBounds = null;
      if (client?.logoUrl && slide.logoEnabled) {
        preloadedLogo = await new Promise(r => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => r(img);
          img.onerror = () => r(null);
          img.src = client.logoUrl;
        });
        if (preloadedLogo) {
          logoBounds = computeLogoPos(slide, SW, SH, preloadedLogo.naturalWidth, preloadedLogo.naturalHeight);
        }
      }

      if (slide.tipo === 'capa') {
        /* ── CAPA: image top, gradient overlay, text bottom ── */
        ctx.fillStyle = slide.bgColor || cs;
        ctx.fillRect(0, 0, SW, SH);
        if (hasSlideImage(slide)) await drawImage(ctx, slideImgSrc(slide), slide.imageScale || 1, slide.imageOffsetY || 0, buildImgFilter(slide));

        const textPos = slide.textPosition || 'bottom';
        const gs = slide.gradientStrength ?? 1;
        if (textPos === 'middle') {
          const radGrad = ctx.createRadialGradient(SW/2, SH/2, 0, SW/2, SH/2, SH * 0.72);
          radGrad.addColorStop(0, `rgba(6,14,24,${(0.85*gs).toFixed(2)})`);
          radGrad.addColorStop(0.6, `rgba(6,14,24,${(0.45*gs).toFixed(2)})`);
          radGrad.addColorStop(1, `rgba(6,14,24,${(0.1*gs).toFixed(2)})`);
          ctx.fillStyle = radGrad;
        } else {
          const grad = ctx.createLinearGradient(0, 0, 0, SH);
          grad.addColorStop(0,   `rgba(6,14,24,${(0.05*gs).toFixed(2)})`);
          grad.addColorStop(0.35,`rgba(6,14,24,${(0.40*gs).toFixed(2)})`);
          grad.addColorStop(0.65,`rgba(6,14,24,${(0.90*gs).toFixed(2)})`);
          grad.addColorStop(1,   `rgba(6,14,24,${(0.98*gs).toFixed(2)})`);
          ctx.fillStyle = grad;
        }
        ctx.fillRect(0, 0, SW, SH);
        if (slide.overlayOpacity) {
          ctx.fillStyle = `rgba(0,0,0,${slide.overlayOpacity})`;
          ctx.fillRect(0, 0, SW, SH);
        }

        // slide count top-right
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.font = `400 30px ${font}`;
        ctx.textAlign = 'right';
        ctx.fillText('1 / deslize →', SW - PAD, 80);

        // destaque (small label above headline)
        const caTA = slide.textAlign || 'left';
        const caTX = caTA === 'center' ? SW/2 : caTA === 'right' ? SW - PAD : PAD;
        const caLS = slide.letterSpacing != null ? `${slide.letterSpacing}px` : '0px';
        const caLH = slide.lineHeight ?? 1;
        let y = (textPos === 'middle' ? SH / 2 - 220 : SH - 520) - (slide.textOffsetY || 0);
        ctx.letterSpacing = caLS;
        if (slide.destaque) {
          ctx.fillStyle = cp;
          ctx.font = `800 52px ${font}`;
          ctx.textAlign = caTA;
          ctx.fillText(slide.destaque.toUpperCase(), caTX, y);
          y += Math.round(52 * (caLH > 1 ? caLH : 1)) + 36;
        }

        // headline
        const hSize = slide.titleFontSize || 78;
        const tc = slide.titleColor || '#ffffff';
        ctx.fillStyle = tc;
        ctx.font = `700 ${hSize}px ${font}`;
        ctx.textAlign = caTA;
        y = drawCSSWrapped(ctx, stripColors(slide.headline || ''), caTX, y, SW - PAD*2, Math.round(hSize * (caLH > 1 ? caLH : 1.22)), 700, hSize, font, caLS);
        y += 24;

        // subtitulo
        if (slide.subtitulo) {
          const subSize = slide.textFontSize || 36;
          ctx.fillStyle = slide.textColor ? (slide.textColor + '99') : 'rgba(255,255,255,0.58)';
          ctx.font = `400 ${subSize}px ${font}`;
          ctx.textAlign = caTA;
          y = drawCSSWrapped(ctx, slide.subtitulo, caTX, y, SW - PAD*2, Math.round(subSize * (caLH > 1 ? caLH : 1.5)), 400, subSize, font, caLS);
        }
        ctx.letterSpacing = '0px';

        // branding bar — sempre fixo no rodapé
        const brandY = SH - 110;
        ctx.fillStyle = cp;
        ctx.beginPath(); ctx.arc(PAD + 8, brandY + 8, 8, 0, Math.PI*2); ctx.fill();
        ctx.font = `700 28px ${font}`;
        ctx.textAlign = 'left';
        ctx.fillText(client.instagram ? `@${client.instagram.replace(/^@/,'')}` : (client.nome || ''), PAD + 28, brandY + 16);

      } else if (slide.tipo === 'cta') {
        /* ── CTA: solid color (respects bgColor), no image ── */
        ctx.fillStyle = slide.bgColor || cp;
        ctx.fillRect(0, 0, SW, SH);
        // subtle diagonal shadow
        const grad2 = ctx.createLinearGradient(0, 0, SW, SH);
        grad2.addColorStop(0, 'rgba(0,0,0,0.12)');
        grad2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad2;
        ctx.fillRect(0, 0, SW, SH);

        const ctaLS = slide.letterSpacing != null ? `${slide.letterSpacing}px` : '0px';
        const ctaLH = slide.lineHeight ?? 1;
        const ctaTA = slide.textAlign || 'center';
        const ctaTX = ctaTA === 'left' ? PAD : ctaTA === 'right' ? SW - PAD : SW/2;
        const ctaTC = slide.textColor || '#ffffff';
        if ((slide.ctaStyle || 'gatilho') === 'mensagem') {
          // ── CTA mensagem livre ──
          let cy = 220;
          if (slide.titulo) {
            const tSize = slide.titleFontSize || 58;
            ctx.fillStyle = slide.titleColor || ctaTC;
            ctx.font = `700 ${tSize}px ${font}`;
            ctx.textAlign = 'center';
            ctx.letterSpacing = ctaLS;
            cy = drawCSSWrapped(ctx, stripColors(slide.titulo), SW/2, cy, SW - PAD*2, Math.round(tSize*(ctaLH>1?ctaLH:1.3)), 700, tSize, font, ctaLS);
            ctx.letterSpacing = '0px';
            cy += 48;
          }
          if (slide.texto) {
            const subSize = slide.textFontSize || 40;
            ctx.fillStyle = slide.textColor ? ctaTC + 'cc' : 'rgba(255,255,255,0.85)';
            ctx.font = `400 ${subSize}px ${font}`;
            ctx.textAlign = 'center';
            cy = drawCSSWrapped(ctx, stripColors(slide.texto), SW/2, cy, SW - PAD*2, Math.round(subSize*(ctaLH>1?ctaLH:1.5)), 400, subSize, font, '0px');
            cy += 48;
          }
          const ig = (client?.instagram || '').replace(/^@/, '');
          if (ig) {
            const igText = `@${ig}`;
            ctx.font = `800 58px ${font}`;
            const igW = ctx.measureText(igText).width + 100;
            const igH = 120;
            const igX = (SW - igW) / 2;
            ctx.fillStyle = cs;
            ctx.beginPath(); ctx.roundRect(igX, cy, igW, igH, 20); ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(igText, SW/2, cy + 80);
          }
        } else {
          // ── CTA palavra-gatilho ──
          let cy = 260;
          if (slide.titulo) {
            const tSize = slide.titleFontSize || 56;
            ctx.fillStyle = slide.titleColor || ctaTC;
            ctx.font = `700 ${tSize}px ${font}`;
            ctx.textAlign = ctaTA;
            ctx.letterSpacing = ctaLS;
            cy = drawCSSWrapped(ctx, stripColors(slide.titulo), ctaTX, cy, SW - PAD*2, Math.round(tSize*(ctaLH>1?ctaLH:1.3)), 700, tSize, font, ctaLS);
            ctx.letterSpacing = '0px';
            cy += 60;
          }
          const word = (slide.palavra_gatilho || 'COMENTE').toUpperCase();
          ctx.font = `800 100px ${font}`;
          const wm = ctx.measureText(word);
          const bw = wm.width + 120, bh = 150, bx = (SW - bw)/2, by = cy;
          ctx.fillStyle = cs;
          ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.textAlign = 'center';
          ctx.fillText(word, SW/2, by + 108);
          cy = by + bh + 56;
          ctx.fillStyle = slide.textColor ? ctaTC + 'cc' : 'rgba(255,255,255,0.88)';
          ctx.font = `400 40px ${font}`;
          ctx.textAlign = 'center';
          ctx.fillText('Comente esta palavra abaixo', SW/2, cy);
          cy += 56;
          if (slide.texto) {
            const subSize = slide.textFontSize || 34;
            ctx.fillStyle = slide.textColor ? ctaTC + '99' : 'rgba(255,255,255,0.65)';
            ctx.font = `400 ${subSize}px ${font}`;
            ctx.textAlign = 'center';
            drawCSSWrapped(ctx, stripColors(slide.texto), SW/2, cy, SW - PAD*2, Math.round(subSize * (ctaLH>1?ctaLH:1.4)), 400, subSize, font, '0px');
          }
        }

      } else {
        /* ── CONTEÚDO ── */
        const layout = slide.layout || 'inline';
        ctx.fillStyle = slide.bgColor || cs;
        ctx.fillRect(0, 0, SW, SH);
        ctx.fillStyle = cp;
        ctx.fillRect(0, 0, SW, 8);

        const stc = slide.textColor || '#ffffff';
        const coTA = slide.textAlign || 'left';
        const coTX = coTA === 'center' ? SW/2 : coTA === 'right' ? SW - PAD : PAD;
        const coLS = slide.letterSpacing != null ? `${slide.letterSpacing}px` : '0px';
        const coLH = slide.lineHeight ?? 1;
        const drawTitle = async (y, defaultSize = 72) => {
          if (!slide.titulo) return y;
          const tSize = slide.titleFontSize || defaultSize;
          ctx.fillStyle = slide.titleColor || stc;
          ctx.font = `700 ${tSize}px ${font}`;
          ctx.textAlign = coTA;
          ctx.letterSpacing = coLS;
          const lh = Math.round(tSize*(coLH>1?coLH:1.2));
          const ny = drawCSSWrapped(ctx, stripColors(slide.titulo), coTX, y, SW - PAD*2, lh, 700, tSize, font, coLS) + 30;
          ctx.letterSpacing = '0px';
          return ny;
        };
        const drawBody = (y, color, size, lh) => {
          if (!slide.texto) return y;
          ctx.fillStyle = slide.textColor ? stc + 'cc' : color;
          ctx.font = `400 ${size}px ${font}`;
          ctx.textAlign = coTA;
          ctx.letterSpacing = coLS;
          const computedLh = Math.round(size*(coLH>1?coLH:lh/size));
          const ny = drawCSSWrapped(ctx, stripColors(slide.texto), coTX, y, SW - PAD*2, computedLh, 400, size, font, coLS);
          ctx.letterSpacing = '0px';
          return ny;
        };
        const vAlign = slide.contentVAlign || (layout === 'texto' ? 'center' : 'top');
        const textOffY = slide.textOffsetY || 0;
        const startYByVAlign = (vAlign === 'bottom' ? 700 : vAlign === 'center' ? 400 : 140) + textOffY;
        const tOff = slide.titleOffsetY || 0;
        const bOff = slide.bodyOffsetY || 0;
        const iOff = slide.imageFrameOffsetY || 0;
        const withShift = async (off, fn) => { ctx.save(); ctx.translate(0, off); const r = await fn(); ctx.restore(); return r; };

        if (layout === 'lateral') {
          let ty = startYByVAlign;
          ty = await withShift(tOff, () => drawTitle(ty, 60));
          await withShift(bOff, async () => drawBody(ty, 'rgba(255,255,255,0.78)', slide.textFontSize||40, 62));
          if (hasSlideImage(slide)) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            await new Promise(r => {
              img.onload = () => {
                const f = buildImgFilter(slide);
                if (f) ctx.filter = f;
                ctx.drawImage(img, SW/2 + 20, 8, SW/2 - 20, SH - 8);
                if (f) ctx.filter = 'none';
                r();
              };
              img.onerror = r;
              img.src = slideImgSrc(slide);
            });
          }


        } else if (layout === 'texto') {
          let ty = startYByVAlign;
          ty = await withShift(tOff, () => drawTitle(ty));
          await withShift(bOff, async () => drawBody(ty, '#ffffff', slide.textFontSize||58, 88));


        } else {
          // inline (default) — respeita imagePosition: top | middle | bottom
          const imgPos = slide.imagePosition || 'middle';
          const imgH = 380;
          const drawImg = async (y) => {
            if (!hasSlideImage(slide)) return y;
            ctx.save();
            const f = buildImgFilter(slide);
            if (f) ctx.filter = f;
            ctx.beginPath();
            ctx.roundRect(PAD, y, SW - PAD*2, imgH, 18);
            ctx.clip();
            const img = new Image();
            img.crossOrigin = 'anonymous';
            await new Promise(r => {
              img.onload = () => {
                const sc = slide.imageScale || 1;
                const offY = slide.imageOffsetY || 0;
                const containerW = SW - PAD*2;
                let drawW, drawH;
                if (sc > 1) {
                  drawW = containerW * sc;
                  drawH = drawW * img.naturalHeight / img.naturalWidth;
                } else {
                  const coverScale = Math.max(containerW / img.naturalWidth, imgH / img.naturalHeight);
                  drawW = img.naturalWidth * coverScale;
                  drawH = img.naturalHeight * coverScale;
                }
                const drawX = PAD - (drawW - containerW) / 2;
                const drawY = y - (drawH - imgH) * (50 + offY) / 100;
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
                r();
              };
              img.onerror = r;
              img.src = slideImgSrc(slide);
            });
            ctx.restore();
            return y + imgH + 80;
          };

          let ty = startYByVAlign;
          if (imgPos === 'top') {
            ty = await withShift(iOff, () => drawImg(ty));
            ty = await withShift(tOff, () => drawTitle(ty));
            await withShift(bOff, async () => drawBody(ty, 'rgba(255,255,255,0.72)', slide.textFontSize||44, 68));
          } else if (imgPos === 'bottom') {
            ty = await withShift(tOff, () => drawTitle(ty));
            ty = await withShift(bOff, async () => drawBody(ty, 'rgba(255,255,255,0.72)', slide.textFontSize||44, 68));
            await withShift(iOff, () => drawImg(ty + 20));
          } else {
            // middle (padrão)
            ty = await withShift(tOff, () => drawTitle(ty));
            ty = await withShift(iOff, () => drawImg(ty));
            await withShift(bOff, async () => drawBody(ty, 'rgba(255,255,255,0.72)', slide.textFontSize||44, 68));
          }

        }
      }

      if (preloadedLogo && logoBounds) {
        const opacity = (slide.logoOpacity ?? 100) / 100;
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.drawImage(preloadedLogo, logoBounds.x, logoBounds.y, logoBounds.w, logoBounds.h);
        ctx.restore();
      }

      return canvas;
    }

    async function downloadAll(slides, client) {
      const zip = new JSZip();
      for (let i = 0; i < slides.length; i++) {
        const canvas = await renderToCanvas(slides[i], client);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        zip.file(`slide-${String(i+1).padStart(2,'0')}.png`, blob);
      }
      const content = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = `carrossel-${Date.now()}.zip`;
      a.click();
    }

    async function downloadOne(slide, client, i) {
      const canvas = await renderToCanvas(slide, client);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `slide-${String(i+1).padStart(2,'0')}.png`;
      a.click();
    }

    /* ── STYLES ── */
    const S = {

    /* ── FONT PICKER ── */
    function FontPicker({ value, onChange }) {
      const [open, setOpen] = useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        function close(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener('mousedown', close);
        return () => document.removeEventListener('mousedown', close);
      }, []);
      return (
        <div ref={ref} style={{position:'relative'}}>
          <div onClick={() => setOpen(o => !o)} style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:'var(--l-surf2)', border:`1px solid ${open ? ORANGE : 'var(--l-border)'}`,
            borderRadius:8, padding:'10px 14px', cursor:'pointer',
            transition:'border-color 0.15s',
          }}>
            <span style={{fontFamily:`'${value}',sans-serif`, fontSize:17, color:'var(--l-t1)', fontWeight:500}}>{value}</span>
            <span style={{color:'var(--l-t3)', fontSize:11, marginLeft:8}}>{open ? '▲' : '▼'}</span>
          </div>
          {open && (
            <div style={{
              position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:200,
              background:'var(--l-surf)', border:'1px solid var(--l-border)', borderRadius:10,
              boxShadow:'0 8px 32px rgba(0,0,0,0.12)', overflow:'hidden',
            }}>
              {FONTS.map(fn => (
                <div key={fn} onClick={() => { onChange(fn); setOpen(false); }} style={{
                  padding:'11px 16px', cursor:'pointer',
                  background: fn === value ? 'rgba(244,117,48,0.07)' : 'transparent',
                  borderLeft: fn === value ? `3px solid ${ORANGE}` : '3px solid transparent',
                  transition:'background 0.1s',
                  display:'flex', alignItems:'baseline', gap:10,
                }}>
                  <span style={{fontFamily:`'${fn}',sans-serif`, fontSize:18, color:'var(--l-t1)', fontWeight:500, minWidth:160}}>{fn}</span>
                  <span style={{fontFamily:`'${fn}',sans-serif`, fontSize:13, color:'var(--l-t3)'}}>Saúde da mulher</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ── SLIDE CARD PREVIEW ── */
    function stripColors(text) {
      return text ? text.replace(/\{([^}]+)\}/g, '$1') : text;
    }
    function renderColored(text, defColor, accentColor) {
      if (!text || !text.includes('{')) return text;
      return text.split(/(\{[^}]+\})/).map((part, i) =>
        part.startsWith('{') && part.endsWith('}')
          ? React.createElement('span', {key:i, style:{color:accentColor}}, part.slice(1,-1))
          : React.createElement('span', {key:i}, part)
      );
    }

    function SlideCard({ slide, idx, client, onEdit, onDownload, onRegen, regenning, onUploadImage, onClearImage, onDelete, onApplyLogoAll, scale }) {
      const PW = Math.round(SW * scale);
      const PH = Math.round(SH * scale);
      const isCta = slide.tipo === 'cta';
      const cp = client?.corPrimaria || ORANGE;
      const cs = client?.corSecundaria || DARK;
      const slideBg = slide.bgColor || (isCta ? cp : cs);

      const fileRef = useRef(null);
      const [imgOpen, setImgOpen] = useState(false);
      const [logoOpen, setLogoOpen] = useState(false);
      const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => onUploadImage(idx, ev.target.result.split(',')[1]);
        reader.readAsDataURL(file);
      };

      const imgBg = hasSlideImage(slide) ? `url(${slideImgSrc(slide)})` : null;

      const wrapperStyle = {
        width: PW, height: PH, borderRadius: 10, overflow: 'hidden',
        cursor: 'pointer', position: 'relative', flexShrink: 0,
        border: '1px solid var(--l-border)',
      };

      const innerStyle = {
        width: SW, height: SH, position: 'absolute', top: 0, left: 0,
        transform: `scale(${scale})`, transformOrigin: 'top left',
        fontFamily: 'Sora,sans-serif', overflow: 'hidden', position: 'absolute',
      };

      const PAD = 90;

      return (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={{...wrapperStyle,position:'sticky',top:8,zIndex:2}} onClick={()=>onEdit(slide,idx)}>
            <div style={innerStyle}>

              {/* ── CAPA ── */}
              {slide.tipo === 'capa' && (() => {
                const pos = slide.textPosition || 'bottom';
                const tOff = slide.textOffsetY || 0;
                const textStyle = pos === 'middle'
                  ? {position:'absolute',top:'50%',left:0,right:0,transform:`translateY(calc(-50% - ${tOff}px))`,padding:`0 ${PAD}px`,display:'flex',flexDirection:'column',gap:24}
                  : {position:'absolute',bottom:0,left:0,right:0,transform:`translateY(-${tOff}px)`,padding:`0 ${PAD}px 100px`,display:'flex',flexDirection:'column',gap:24};
                const gs = slide.gradientStrength ?? 1;
                const gradStyle = pos === 'middle'
                  ? `radial-gradient(ellipse at center, rgba(6,14,24,${(0.82*gs).toFixed(2)}) 0%, rgba(6,14,24,${(0.35*gs).toFixed(2)}) 70%, rgba(6,14,24,${(0.1*gs).toFixed(2)}) 100%)`
                  : `linear-gradient(180deg,rgba(6,14,24,${(0.05*gs).toFixed(2)}) 0%,rgba(6,14,24,${(0.40*gs).toFixed(2)}) 35%,rgba(6,14,24,${(0.92*gs).toFixed(2)}) 70%,rgba(6,14,24,${(0.98*gs).toFixed(2)}) 100%)`;
                return (
                <div style={{width:SW,height:SH,position:'relative',background:cs}}>
                  {imgBg && <div style={{position:'absolute',inset:0,backgroundImage:imgBg,backgroundSize:slide.imageScale&&slide.imageScale>1?`${slide.imageScale*100}%`:'cover',backgroundPosition:`center ${50+(slide.imageOffsetY||0)}%`,backgroundRepeat:'no-repeat',filter:buildImgFilter(slide)||undefined}} />}
                  <div style={{position:'absolute',inset:0,background:gradStyle}} />
                  {(slide.overlayOpacity||0)>0 && <div style={{position:'absolute',inset:0,background:`rgba(0,0,0,${slide.overlayOpacity})`,pointerEvents:'none'}} />}
                  <div style={textStyle}>
                    {slide.destaque && <div style={{color:slide.accentColor||cp,fontSize:46,fontWeight:800,textTransform:'uppercase',letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:'0.04em',lineHeight:slide.lineHeight??1,textAlign:slide.textAlign||'left'}}>{slide.destaque}</div>}
                    <div style={{color:slide.titleColor||'#fff',fontSize:slide.titleFontSize||78,fontWeight:700,lineHeight:slide.lineHeight??1.18,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left'}}>{renderColored(slide.headline, slide.titleColor||'#fff', slide.accentColor||cp)}</div>
                    {slide.subtitulo && <div style={{color:slide.textColor?`${slide.textColor}99`:'rgba(255,255,255,0.6)',fontSize:slide.textFontSize||36,lineHeight:slide.lineHeight??1.5,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left'}}>{slide.subtitulo}</div>}
                  </div>
                  {/* Branding — sempre fixo no rodapé */}
                  <div style={{position:'absolute',bottom:72,left:0,right:0,padding:`0 ${PAD}px`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{display:'flex',alignItems:'center',gap:14}}>
                      <div style={{width:8,height:8,borderRadius:'50%',background:cp}} />
                      <span style={{color:slide.accentColor||cp,fontSize:26,fontWeight:700}}>{client?.instagram ? `@${client.instagram.replace(/^@/,'')}` : client?.nome || ''}</span>
                    </div>
                    <div style={{color:'rgba(255,255,255,0.35)',fontSize:28}}>deslize →</div>
                  </div>
                  <div style={{position:'absolute',top:60,right:PAD,color:'rgba(255,255,255,0.25)',fontSize:30}}>1 / {idx+1}</div>
                </div>
                );
              })()}

              {/* ── CONTEÚDO ── */}
              {slide.tipo === 'conteudo' && (() => {
                const layout = slide.layout || 'inline';
                const imgEl = hasSlideImage(slide) ? <div style={{borderRadius:20,overflow:'hidden',flexShrink:0}}><img src={slideImgSrc(slide)} crossOrigin="anonymous" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',filter:buildImgFilter(slide)||undefined}} alt="" /></div> : null;

                const vAlign = slide.contentVAlign || (layout === 'texto' ? 'center' : 'top');
                const justifyContent = vAlign === 'bottom' ? 'flex-end' : vAlign === 'center' ? 'center' : 'flex-start';

                if (layout === 'lateral') {
                  return (
                    <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                      <div style={{height:8,background:cp,flexShrink:0}} />
                      <div style={{flex:1,display:'flex',minHeight:0}}>
                        <div style={{flex:1,padding:`60px ${PAD}px 60px`,display:'flex',flexDirection:'column',gap:30,justifyContent,transform:slide.textOffsetY?`translateY(${slide.textOffsetY}px)`:undefined}}>
                          {slide.titulo && <div style={{color:slide.titleColor||slide.textColor||'#fff',fontSize:slide.titleFontSize||60,fontWeight:700,lineHeight:slide.lineHeight??1.18,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',transform:slide.titleOffsetY?`translateY(${slide.titleOffsetY}px)`:undefined}}>{renderColored(slide.titulo, slide.titleColor||slide.textColor||'#fff', slide.accentColor||cp)}</div>}
                          {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.78)',fontSize:slide.textFontSize||40,lineHeight:slide.lineHeight??1.65,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',transform:slide.bodyOffsetY?`translateY(${slide.bodyOffsetY}px)`:undefined}}>{slide.texto}</div>}
                        </div>
                        {hasSlideImage(slide) && <div style={{width:'45%',flexShrink:0,overflow:'hidden',transform:slide.imageFrameOffsetY?`translateY(${slide.imageFrameOffsetY}px)`:undefined}}><img src={slideImgSrc(slide)} crossOrigin="anonymous" style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center',filter:buildImgFilter(slide)||undefined}} alt="" /></div>}
                      </div>
                    </div>
                  );
                }
                if (layout === 'texto') {
                  return (
                    <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                      <div style={{height:8,background:cp,flexShrink:0}} />
                      <div style={{flex:1,padding:`70px ${PAD}px 70px`,display:'flex',flexDirection:'column',gap:36,justifyContent,transform:slide.textOffsetY?`translateY(${slide.textOffsetY}px)`:undefined}}>
                        {slide.titulo && <div style={{color:slide.titleColor||slide.textColor||'#fff',fontSize:slide.titleFontSize||72,fontWeight:700,lineHeight:slide.lineHeight??1.18,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',transform:slide.titleOffsetY?`translateY(${slide.titleOffsetY}px)`:undefined}}>{renderColored(slide.titulo, slide.titleColor||slide.textColor||'#fff', slide.accentColor||cp)}</div>}
                        {slide.texto && <div style={{color:slide.textColor||'#fff',fontSize:slide.textFontSize||58,fontWeight:500,lineHeight:slide.lineHeight??1.5,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',transform:slide.bodyOffsetY?`translateY(${slide.bodyOffsetY}px)`:undefined}}>{slide.texto}</div>}
                      </div>
                    </div>
                  );
                }
                // inline (default)
                const imgPos = slide.imagePosition || 'middle';
                const inlineJustify = vAlign === 'bottom' ? 'flex-end' : vAlign === 'center' ? 'center' : 'flex-start';
                const imgScale = slide.imageScale || 1;
                const imgOffY = slide.imageOffsetY || 0;
                const imgBlock = hasSlideImage(slide) ? (
                  <div style={{width:'100%',height:380,borderRadius:20,overflow:'hidden',flexShrink:0,backgroundImage:`url(${slideImgSrc(slide)})`,backgroundSize:imgScale>1?`${imgScale*100}%`:'cover',backgroundPosition:`center ${50+imgOffY}%`,backgroundRepeat:'no-repeat',filter:buildImgFilter(slide)||undefined,transform:slide.imageFrameOffsetY?`translateY(${slide.imageFrameOffsetY}px)`:undefined}} />
                ) : null;
                return (
                  <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                    <div style={{height:8,background:cp,flexShrink:0}} />
                    <div style={{flex:1,padding:`70px ${PAD}px 70px`,display:'flex',flexDirection:'column',gap:36,justifyContent:inlineJustify,transform:slide.textOffsetY?`translateY(${slide.textOffsetY}px)`:undefined}}>
                      {imgPos==='top' && imgBlock}
                      {slide.titulo && <div style={{color:slide.titleColor||slide.textColor||'#fff',fontSize:slide.titleFontSize||72,fontWeight:700,lineHeight:slide.lineHeight??1.18,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',transform:slide.titleOffsetY?`translateY(${slide.titleOffsetY}px)`:undefined}}>{renderColored(slide.titulo, slide.titleColor||slide.textColor||'#fff', slide.accentColor||cp)}</div>}
                      {imgPos==='middle' && imgBlock}
                      {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.72)',fontSize:slide.textFontSize||44,lineHeight:slide.lineHeight??1.65,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'left',flex:imgPos==='bottom'?1:undefined,transform:slide.bodyOffsetY?`translateY(${slide.bodyOffsetY}px)`:undefined}}>{slide.texto}</div>}
                      {imgPos==='bottom' && imgBlock}
                    </div>
                  </div>
                );
              })()}

              {/* ── CTA ── */}
              {slide.tipo === 'cta' && (() => {
                const ctaS = slide.ctaStyle || 'gatilho';
                const igHandle = client?.instagram ? client.instagram.replace(/^@/,'') : null;
                if (ctaS === 'mensagem') return (
                  <div style={{width:SW,height:SH,position:'relative',background:slideBg}}>
                    <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0) 60%)'}} />
                    <div style={{position:'absolute',inset:0,padding:`${PAD}px`,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',textAlign:'center',gap:40}}>
                      {slide.titulo && <div style={{color:slide.titleColor||slide.textColor||'#fff',fontSize:slide.titleFontSize||58,fontWeight:700,lineHeight:slide.lineHeight??1.25,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:'center'}}>{renderColored(slide.titulo,slide.titleColor||slide.textColor||'#fff',slide.accentColor||cp)}</div>}
                      {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.85)',fontSize:slide.textFontSize||40,lineHeight:slide.lineHeight??1.5,whiteSpace:'pre-wrap',textAlign:'center'}}>{renderColored(slide.texto,slide.textColor||'#fff',slide.accentColor||cp)}</div>}
                      {igHandle && <div style={{background:cs,borderRadius:20,padding:'22px 60px',marginTop:8}}><div style={{color:'#fff',fontSize:52,fontWeight:800,letterSpacing:'0.02em',lineHeight:1}}>@{igHandle}</div></div>}
                    </div>
                  </div>
                );
                return (
                  <div style={{width:SW,height:SH,position:'relative',background:slideBg}}>
                    <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0) 60%)'}} />
                    <div style={{position:'absolute',inset:0,padding:`${PAD}px`,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',textAlign:'center',gap:48}}>
                      {slide.titulo && <div style={{color:slide.titleColor||slide.textColor||'#fff',fontSize:slide.titleFontSize||56,fontWeight:700,lineHeight:slide.lineHeight??1.3,letterSpacing:slide.letterSpacing!=null?`${slide.letterSpacing}px`:undefined,whiteSpace:'pre-wrap',textAlign:slide.textAlign||'center'}}>{renderColored(slide.titulo,slide.titleColor||slide.textColor||'#fff',slide.accentColor||cp)}</div>}
                      <div style={{background:cs,borderRadius:20,padding:'32px 80px'}}>
                        <div style={{color:'#fff',fontSize:96,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.04em',lineHeight:1}}>{slide.palavra_gatilho||'COMENTE'}</div>
                      </div>
                      <div style={{display:'flex',flexDirection:'column',gap:12}}>
                        <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.9)',fontSize:36,fontWeight:500}}>Comente esta palavra abaixo</div>
                        {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}99`:'rgba(255,255,255,0.7)',fontSize:slide.textFontSize||34,lineHeight:slide.lineHeight??1.4,whiteSpace:'pre-wrap'}}>{slide.texto}</div>}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* ── LOGO OVERLAY (camada flutuante livre) ── */}
              {client?.logoUrl && slide.logoEnabled && (() => {
                const sizePct = Math.max(5, Math.min(80, slide.logoSize || 25));
                const opacity = (slide.logoOpacity ?? 100) / 100;
                let lx, ly;
                if (slide.logoX != null || slide.logoY != null) {
                  lx = slide.logoX ?? 50;
                  ly = slide.logoY ?? 90;
                } else {
                  const pos = slide.logoPosition || 'bc';
                  const v = pos[0], hh = pos[1];
                  lx = hh === 'l' ? 8 : hh === 'r' ? 92 : 50;
                  ly = v === 't' ? 8 : v === 'b' ? 92 : 50;
                }
                const style = { position:'absolute', width:`${sizePct}%`, height:'auto', opacity, pointerEvents:'none', left:`${lx}%`, top:`${ly}%`, transform:'translate(-50%, -50%)', zIndex:10 };
                return <img src={client.logoUrl} crossOrigin="anonymous" style={style} alt="logo" />;
              })()}

            </div>
          </div>
          {/* Gemini — linha dedicada e destacada */}
          <button onClick={()=>onRegen(slide,idx)} disabled={regenning} style={{width:PW,background:regenning?'var(--l-surf2)':'rgba(244,117,48,0.08)',border:`1px solid ${regenning?'var(--l-border)':'rgba(244,117,48,0.3)'}`,borderRadius:7,padding:'12px 8px',fontFamily:'Sora,sans-serif',fontSize:11,fontWeight:600,color:regenning?'var(--l-t3)':cp,cursor:regenning?'default':'pointer',textAlign:'center'}}>
            {regenning ? '⟳ Gerando imagem...' : '⟳ Gerar Imagem com Gemini'}
          </button>
          {/* ações secundárias */}
          <div style={{display:'flex',gap:1,width:PW,background:'var(--l-surf2)',borderRadius:6,overflow:'hidden',border:'1px solid var(--l-border)'}}>
            <button onClick={()=>onEdit(slide,idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:11,color:'var(--l-t2)',minHeight:44,padding:0,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>✏ Editar</button>
            <button onClick={()=>onDownload(slide,idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:11,color:'var(--l-t2)',minHeight:44,padding:0,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>↓ PNG</button>
            <button onClick={()=>fileRef.current?.click()} style={{...S.btnG,flex:1,textAlign:'center',fontSize:11,color:'var(--l-t2)',minHeight:44,padding:0,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>📁 Img</button>
            {hasSlideImage(slide) && <button onClick={()=>onClearImage(idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:11,color:'rgba(210,60,60,0.8)',minHeight:44,padding:0,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>✕ Limpar</button>}
            <button onClick={()=>onDelete(idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:11,color:'rgba(210,60,60,0.8)',minHeight:44,padding:0,display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>🗑 Del</button>
          </div>
          {/* hidden file input */}
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleUpload} />
          {/* cores de fundo e texto — disponível para todos os tipos */}
          {(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:6,width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,padding:'8px 8px'}}>
              {[
                {label:'Fundo',  val:slide.bgColor||slideBg,                         set:v=>onEdit({...slide,bgColor:v},idx,true),      dirty:slide.bgColor,      reset:()=>onEdit({...slide,bgColor:null},idx,true)},
                {label:'Título', val:slide.titleColor||'#ffffff',                      set:v=>onEdit({...slide,titleColor:v},idx,true),   dirty:slide.titleColor,   reset:()=>onEdit({...slide,titleColor:null},idx,true)},
                {label:'Texto',  val:slide.textColor||'#ffffff',                      set:v=>onEdit({...slide,textColor:v},idx,true),    dirty:slide.textColor,    reset:()=>onEdit({...slide,textColor:null},idx,true)},
                {label:'Acento', val:slide.accentColor||cs,                           set:v=>onEdit({...slide,accentColor:v},idx,true),  dirty:slide.accentColor,  reset:()=>onEdit({...slide,accentColor:null},idx,true)},
              ].map(c=>(
                <div key={c.label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <span style={{fontSize:11,color:'var(--l-label)',fontWeight:500}}>{c.label}</span>
                  <ColorRgbPicker val={c.val} onSet={c.set} dirty={c.dirty} onReset={c.reset} />
                </div>
              ))}
            </div>
          )}
          {/* overlay escuro + zoom + posição da imagem + posição do texto — só para capa */}
          {slide.tipo === 'capa' && (
            <div style={{display:'flex',flexDirection:'column',gap:8,width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,padding:'10px 10px'}}>
              {hasSlideImage(slide) && <>
                <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                  <span style={{fontSize:11,color:'var(--l-label)',width:52,flexShrink:0}}>Escuro</span>
                  <input type="range" min={0} max={0.8} step={0.05} value={slide.overlayOpacity||0} onChange={e=>onEdit({...slide,overlayOpacity:parseFloat(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                  <span style={{fontSize:11,color:'var(--l-label)',width:32,textAlign:'right'}}>{Math.round((slide.overlayOpacity||0)*100)}%</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                  <span style={{fontSize:11,color:'var(--l-label)',width:52,flexShrink:0}}>Gradiente</span>
                  <input type="range" min={0} max={1} step={0.05} value={slide.gradientStrength??1} onChange={e=>onEdit({...slide,gradientStrength:parseFloat(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                  <span style={{fontSize:11,color:'var(--l-label)',width:32,textAlign:'right'}}>{Math.round((slide.gradientStrength??1)*100)}%</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                  <span style={{fontSize:11,color:'var(--l-label)',width:52,flexShrink:0}}>Zoom</span>
                  <input type="range" min={1} max={2.5} step={0.05} value={slide.imageScale||1} onChange={e=>onEdit({...slide,imageScale:parseFloat(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                  <span style={{fontSize:11,color:'var(--l-label)',width:32,textAlign:'right'}}>{Math.round((slide.imageScale||1)*100)}%</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                  <span style={{fontSize:11,color:'var(--l-label)',width:52,flexShrink:0}}>Img ↕</span>
                  <input type="range" min={-50} max={50} step={1} value={slide.imageOffsetY||0} onChange={e=>onEdit({...slide,imageOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                  <span style={{fontSize:11,color:'var(--l-label)',width:32,textAlign:'right'}}>{(slide.imageOffsetY||0)>0?'+':''}{slide.imageOffsetY||0}</span>
                </div>
                <div style={{height:1,background:'var(--l-border)',margin:'0'}} />
              </>}
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:52,flexShrink:0}}>Texto ↕</span>
                <input type="range" min={-400} max={400} step={10} value={slide.textOffsetY||0} onChange={e=>onEdit({...slide,textOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:32,textAlign:'right'}}>{(slide.textOffsetY||0)>0?'+':''}{slide.textOffsetY||0}</span>
              </div>
            </div>
          )}
          {/* zoom + offset da imagem + offsets independentes — só para conteúdo */}
          {slide.tipo === 'conteudo' && hasSlideImage(slide) && (
            <div style={{display:'flex',flexDirection:'column',gap:8,width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,padding:'10px 10px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Zoom foto</span>
                <input type="range" min={1} max={2.5} step={0.05} value={slide.imageScale||1} onChange={e=>onEdit({...slide,imageScale:parseFloat(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{Math.round((slide.imageScale||1)*100)}%</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Foto interna ↕</span>
                <input type="range" min={-50} max={50} step={1} value={slide.imageOffsetY||0} onChange={e=>onEdit({...slide,imageOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.imageOffsetY||0)>0?'+':''}{slide.imageOffsetY||0}</span>
              </div>
              <div style={{height:1,background:'var(--l-border)',margin:'2px 0'}} />
              <div style={{fontSize:10,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,opacity:0.7}}>Posição dos elementos</div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Título ↕</span>
                <input type="range" min={-400} max={400} step={5} value={slide.titleOffsetY||0} onChange={e=>onEdit({...slide,titleOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.titleOffsetY||0)>0?'+':''}{slide.titleOffsetY||0}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Foto ↕</span>
                <input type="range" min={-400} max={400} step={5} value={slide.imageFrameOffsetY||0} onChange={e=>onEdit({...slide,imageFrameOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.imageFrameOffsetY||0)>0?'+':''}{slide.imageFrameOffsetY||0}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Texto ↕</span>
                <input type="range" min={-400} max={400} step={5} value={slide.bodyOffsetY||0} onChange={e=>onEdit({...slide,bodyOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.bodyOffsetY||0)>0?'+':''}{slide.bodyOffsetY||0}</span>
              </div>
              {!!slide.textOffsetY && (
                <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                  <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Grupo ↕</span>
                  <input type="range" min={-400} max={400} step={10} value={slide.textOffsetY||0} onChange={e=>onEdit({...slide,textOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                  <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.textOffsetY||0)>0?'+':''}{slide.textOffsetY||0}</span>
                </div>
              )}
            </div>
          )}
          {slide.tipo === 'conteudo' && !hasSlideImage(slide) && (
            <div style={{display:'flex',flexDirection:'column',gap:8,width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,padding:'10px 10px'}}>
              <div style={{fontSize:10,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,opacity:0.7}}>Posição dos elementos</div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Título ↕</span>
                <input type="range" min={-400} max={400} step={5} value={slide.titleOffsetY||0} onChange={e=>onEdit({...slide,titleOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.titleOffsetY||0)>0?'+':''}{slide.titleOffsetY||0}</span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                <span style={{fontSize:11,color:'var(--l-label)',width:62,flexShrink:0}}>Texto ↕</span>
                <input type="range" min={-400} max={400} step={5} value={slide.bodyOffsetY||0} onChange={e=>onEdit({...slide,bodyOffsetY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{(slide.bodyOffsetY||0)>0?'+':''}{slide.bodyOffsetY||0}</span>
              </div>
            </div>
          )}
          {/* estilo do CTA — só para slides cta */}
          {slide.tipo === 'cta' && (
            <div style={{display:'flex',flexDirection:'column',gap:8,width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,padding:'10px 10px'}}>
              <span style={{fontSize:11,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600}}>Estilo do slide final</span>
              <div style={{display:'flex',gap:4}}>
                {[{v:'gatilho',l:'💬 Palavra-gatilho'},{v:'mensagem',l:'💌 Mensagem livre'}].map(opt=>(
                  <button key={opt.v} onClick={()=>onEdit({...slide,ctaStyle:opt.v},idx,true)} style={{flex:1,padding:'8px 0',fontSize:11,fontWeight:600,borderRadius:5,border:`1px solid ${(slide.ctaStyle||'gatilho')===opt.v?ORANGE:'var(--l-border)'}`,background:(slide.ctaStyle||'gatilho')===opt.v?ORANGE:'transparent',color:(slide.ctaStyle||'gatilho')===opt.v?'#fff':'var(--l-label)',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>{opt.l}</button>
                ))}
              </div>
            </div>
          )}
          {/* logo da médica — posição, tamanho, opacidade — colapsável */}
          {client?.logoUrl && (
            <div style={{width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,overflow:'hidden'}}>
              <button onClick={()=>setLogoOpen(o=>!o)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'10px 10px',background:'none',border:'none',cursor:'pointer',touchAction:'manipulation',minHeight:40}}>
                <span style={{fontSize:11,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600}}>Logo {slide.logoEnabled?'(ativo)':''}</span>
                <span style={{fontSize:13,color:'var(--l-label)',display:'inline-block',transform:logoOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▾</span>
              </button>
              {logoOpen && (
                <div style={{display:'flex',flexDirection:'column',gap:10,padding:'0 10px 12px'}}>
                  <label style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--l-t2)',cursor:'pointer',minHeight:32}}>
                    <input type="checkbox" checked={!!slide.logoEnabled} onChange={e=>onEdit({...slide,logoEnabled:e.target.checked,logoX:slide.logoX??50,logoY:slide.logoY??90,logoSize:slide.logoSize||25,logoOpacity:slide.logoOpacity??100},idx,true)} style={{accentColor:ORANGE,width:16,height:16}} />
                    Mostrar logo neste slide
                  </label>
                  {slide.logoEnabled && <>
                    <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                      <span style={{fontSize:11,color:'var(--l-label)',width:64,flexShrink:0}}>Posição X</span>
                      <input type="range" min={0} max={100} step={1} value={slide.logoX??50} onChange={e=>onEdit({...slide,logoX:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                      <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{slide.logoX??50}%</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                      <span style={{fontSize:11,color:'var(--l-label)',width:64,flexShrink:0}}>Posição Y</span>
                      <input type="range" min={0} max={100} step={1} value={slide.logoY??90} onChange={e=>onEdit({...slide,logoY:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                      <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{slide.logoY??90}%</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                      <span style={{fontSize:11,color:'var(--l-label)',width:64,flexShrink:0}}>Tamanho</span>
                      <input type="range" min={5} max={80} step={1} value={slide.logoSize||25} onChange={e=>onEdit({...slide,logoSize:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                      <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{slide.logoSize||25}%</span>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                      <span style={{fontSize:11,color:'var(--l-label)',width:64,flexShrink:0}}>Opacidade</span>
                      <input type="range" min={0} max={100} step={5} value={slide.logoOpacity??100} onChange={e=>onEdit({...slide,logoOpacity:parseInt(e.target.value)},idx,true)} style={{flex:1,accentColor:ORANGE}} />
                      <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{slide.logoOpacity??100}%</span>
                    </div>
                  </>}
                  <button onClick={()=>onApplyLogoAll && onApplyLogoAll({logoEnabled:!!slide.logoEnabled,logoX:slide.logoX??50,logoY:slide.logoY??90,logoSize:slide.logoSize||25,logoOpacity:slide.logoOpacity??100})} style={{padding:'8px',fontSize:11,fontWeight:600,borderRadius:5,border:'1px dashed var(--l-border)',background:'transparent',color:'var(--l-t2)',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>
                    ⎘ Aplicar este logo a todos os slides
                  </button>
                </div>
              )}
            </div>
          )}
          {/* ajustes de imagem — brilho, contraste, saturação, matiz — colapsável */}
          {hasSlideImage(slide) && (
            <div style={{width:PW,background:'var(--l-surf2)',border:'1px solid var(--l-border)',borderRadius:6,overflow:'hidden'}}>
              <button onClick={()=>setImgOpen(o=>!o)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%',padding:'10px 10px',background:'none',border:'none',cursor:'pointer',touchAction:'manipulation',minHeight:40}}>
                <span style={{fontSize:11,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600}}>Filtros de Imagem</span>
                <span style={{fontSize:13,color:'var(--l-label)',display:'inline-block',transform:imgOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.2s'}}>▾</span>
              </button>
              {imgOpen && (
                <div style={{display:'flex',flexDirection:'column',gap:8,padding:'0 10px 12px'}}>
                  {[
                    {label:'Brilho',    min:0,   max:200, step:2,  val:slide.imgBrightness??100, set:v=>onEdit({...slide,imgBrightness:v},idx,true), fmt:v=>`${v}%`},
                    {label:'Contraste', min:0,   max:200, step:2,  val:slide.imgContrast??100,   set:v=>onEdit({...slide,imgContrast:v},idx,true),   fmt:v=>`${v}%`},
                    {label:'Saturação', min:0,   max:300, step:5,  val:slide.imgSaturate??100,   set:v=>onEdit({...slide,imgSaturate:v},idx,true),   fmt:v=>`${v}%`},
                    {label:'Matiz',     min:-180,max:180, step:5,  val:slide.imgHue??0,          set:v=>onEdit({...slide,imgHue:v},idx,true),        fmt:v=>`${v>0?'+':''}${v}°`},
                  ].map(r=>(
                    <div key={r.label} style={{display:'flex',alignItems:'center',gap:8,minHeight:36}}>
                      <span style={{fontSize:11,color:'var(--l-label)',width:60,flexShrink:0}}>{r.label}</span>
                      <input type="range" min={r.min} max={r.max} step={r.step} value={r.val} onChange={e=>r.set(parseInt(e.target.value))} style={{flex:1,accentColor:ORANGE}} />
                      <span style={{fontSize:11,color:'var(--l-label)',width:36,textAlign:'right'}}>{r.fmt(r.val)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ── TOGGLE ── */
    function Toggle({ label, sub, checked, onChange, disabled }) {
      return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,opacity:disabled?0.4:1}}>
          <div>
            <div style={{fontSize:13,fontWeight:500}}>{label}</div>
            {sub && <div style={{fontSize:11,color:'var(--l-label)',marginTop:2}}>{sub}</div>}
          </div>
          <div onClick={()=>!disabled&&onChange(!checked)} style={{width:44,height:24,borderRadius:12,background:checked?ORANGE:'#CBD5E1',position:'relative',cursor:disabled?'default':'pointer',transition:'background 0.2s',flexShrink:0}}>
            <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:checked?23:3,transition:'left 0.2s'}} />
          </div>
        </div>
      );
    }

    /* ── TOAST ── */
    function Toast({ msg, isMobile }) {
      return (
        <div style={{position:'fixed',bottom:isMobile?84:28,left:'50%',transform:'translateX(-50%)',background:'rgba(13,25,40,0.97)',border:'1px solid rgba(255,255,255,0.13)',borderRadius:10,padding:'12px 22px',fontSize:13,fontWeight:500,color:'#fff',zIndex:9999,pointerEvents:'none',boxShadow:'0 4px 24px rgba(0,0,0,0.5)',whiteSpace:'nowrap'}}>
          {msg}
        </div>
      );
    }

    /* ── APP ── */
    function App() {
      const [session, setSession]               = useState(null);
      const [authLoading, setAuthLoading]       = useState(true);
      const [profile, setProfile]               = useState(null);
      const [form, setForm]                     = useState({ tema:'', formato:'alerta', numSlides:10, gerarImagens:true, usarFotoMedica:false });
      const [slides, setSlides]                 = useState([]);
      const [legenda, setLegenda]               = useState('');
      const [hashtags, setHashtags]             = useState([]);
      const [palavraGatilho, setPalavraGatilho] = useState('');
      const [generating, setGenerating]         = useState(false);
      const [genImgIdx, setGenImgIdx]           = useState(-1);
      const [progress, setProgress]             = useState('');
      const [error, setError]                   = useState('');
      const [modal, setModal]                   = useState(null);
      const [editClient, setEditClient]         = useState(null);
      const [editSlide, setEditSlide]           = useState(null);
      const [downloading, setDownloading]       = useState(false);
      const [viralStructures, setViralStructures] = useState([]);
      const [savedCarousels, setSavedCarousels] = useState([]);
      const [activeCarouselId, setActiveCarouselId] = useState(null);
      const [savedOpen, setSavedOpen]           = useState(false);
      const [pautaOpen, setPautaOpen]           = useState(false);
      const [pautaSuggestions, setPautaSuggestions] = useState([]);
      const [pautaForm, setPautaForm]           = useState({ temas:'' });
      const [generatingPauta, setGeneratingPauta] = useState(false);
      const [toast, setToast]                     = useState(null);
      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };
      const [isMobile, setIsMobile]               = useState(window.innerWidth < 768);
      const [mobileTab, setMobileTab]             = useState('config');
      const [dynScale, setDynScale]               = useState(computeScale(window.innerWidth));
      const [allProfiles, setAllProfiles]         = useState([]);
      const [activeClientId, setActiveClientId]   = useState(null);
      const [adminError, setAdminError]           = useState('');
      const [dark, setDark]                       = useState(() => localStorage.getItem('acg-theme') === 'dark');

      const isAdmin           = session?.user?.email === ADMIN_EMAIL;
      const activeClientProf  = isAdmin && activeClientId ? allProfiles.find(p => p.user_id === activeClientId) : null;
      const client            = activeClientProf || profile;
      const effectiveUserId   = (isAdmin && activeClientId) ? activeClientId : session?.user?.id;

      useEffect(() => {
        const onResize = () => {
          const w = window.innerWidth;
          setIsMobile(w < 768);
          setDynScale(computeScale(w));
        };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      useEffect(() => {
        if (slides.length > 0 && isMobile) setMobileTab('slides');
      }, [slides.length]);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          if (session) loadProfile(session.user.id, session.user.email, session.access_token);
          else setAuthLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
          setSession(session);
          if (session) loadProfile(session.user.id, session.user.email, session.access_token);
          else { setProfile(null); setAuthLoading(false); }
        });
        return () => subscription.unsubscribe();
      }, []);

      const adminCall = async (action, targetUserId, payload = {}) => {
        const res = await fetch('/api/admin-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session?.access_token}` },
          body: JSON.stringify({ action, targetUserId, payload })
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Admin API error');
        return json;
      };

      const loadProfile = async (userId, userEmail, accessToken) => {
        const { data } = await sb.from('doctor_profiles').select('*').eq('user_id', userId).single();
        setProfile(profileFromDB(data) || { user_id: userId, nome:'', especialidade:'', instagram:'', nicho:'', tomVoz:'Acolhedor, científico, direto', corPrimaria:ORANGE, corSecundaria:DARK, fonte:'Sora', palavrasProibidas:[...DEFAULT_FORBIDDEN], fotoRostoUrl:'', logoUrl:'' });
        setAuthLoading(false);
        loadSavedData(userId);
        if (userEmail === ADMIN_EMAIL) {
          try {
            if (!accessToken) { setAdminError('Token ausente — tente reabrir o app.'); return; }
            const res = await fetch('/api/admin-data', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
              body: JSON.stringify({ action: 'loadProfiles' })
            });
            const json = await res.json();
            if (!res.ok) { setAdminError(`Erro ${res.status}: ${json.error}`); return; }
            if (json.data) {
              setAllProfiles(json.data.map(profileFromDB).filter(Boolean));
              setActiveClientId(userId);
            }
          } catch(e) { setAdminError(`Erro: ${e.message}`); }
        }
      };

      const loadSavedData = async (userId) => {
        const [{ data: carousels }, { data: virals }] = await Promise.all([
          sb.from('saved_carousels').select('*').eq('user_id', userId).order('updated_at', { ascending: false }),
          sb.from('viral_structures').select('*').eq('user_id', userId).order('created_at', { ascending: false })
        ]);
        if (carousels) setSavedCarousels(carousels.map(c => ({
          id: c.id, nome: c.nome, clientNome: c.client_nome, savedAt: c.saved_at,
          form: c.form, slides: c.slides, legenda: c.legenda, hashtags: c.hashtags, palavraGatilho: c.palavra_gatilho
        })));
        if (virals) setViralStructures(virals.map(v => ({
          id: v.id, nome: v.nome, formato: v.formato, numSlides: v.num_slides, criado: v.criado, slides: v.slides
        })));
      };

      const loadSavedDataAdmin = async (userId) => {
        try {
          const [carRes, virRes] = await Promise.all([
            adminCall('loadCarousels', userId),
            adminCall('loadVirals', userId)
          ]);
          if (carRes.data) setSavedCarousels(carRes.data.map(c => ({
            id: c.id, nome: c.nome, clientNome: c.client_nome, savedAt: c.saved_at,
            form: c.form, slides: c.slides, legenda: c.legenda, hashtags: c.hashtags, palavraGatilho: c.palavra_gatilho
          })));
          if (virRes.data) setViralStructures(virRes.data.map(v => ({
            id: v.id, nome: v.nome, formato: v.formato, numSlides: v.num_slides, criado: v.criado, slides: v.slides
          })));
        } catch(e) { console.warn('loadSavedDataAdmin error:', e); }
      };

      const handleSelectClient = async (userId) => {
        setActiveClientId(userId);
        setActiveCarouselId(null);
        setSavedCarousels([]);
        setViralStructures([]);
        if (userId === session?.user?.id) {
          loadSavedData(userId);
        } else {
          await loadSavedDataAdmin(userId);
        }
      };

      const handleSaveClient = async (data) => {
        const targetId = data.user_id || session.user.id;
        const useAdmin = isAdmin && targetId !== session.user.id;
        try {
          if (useAdmin) {
            await adminCall('saveProfile', targetId, { row: profileToDB(data, targetId) });
          } else {
            const { error } = await sb.from('doctor_profiles').upsert(profileToDB(data, targetId), { onConflict: 'user_id' });
            if (error) throw new Error(error.message);
          }
          const updated = { ...data, user_id: targetId };
          if (targetId === session.user.id) setProfile(updated);
          setAllProfiles(prev => {
            const idx = prev.findIndex(p => p.user_id === targetId);
            if (idx === -1) return [...prev, updated];
            return prev.map((p, i) => i === idx ? updated : p);
          });
          showToast('Perfil salvo!');
        } catch (e) {
          setError(`Erro ao salvar perfil: ${e.message}`);
        }
        setModal(null); setEditClient(null);
      };

      const handleLogout = async () => { await sb.auth.signOut(); };

      const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handleManualEntry = () => {
        if (!client) { setError('Configure seu perfil primeiro.'); return; }
        const n = form.numSlides || 10;
        const newSlides = Array.from({ length: n }, (_, i) => {
          const num = i + 1;
          if (i === 0) return { numero: num, tipo: 'capa', headline: '', destaque: '', subtitulo: '', prompt_imagem: '' };
          if (i === n - 1) return { numero: num, tipo: 'cta', titulo: '', texto: '', palavra_gatilho: '', prompt_imagem: '' };
          return { numero: num, tipo: 'conteudo', texto: '', prompt_imagem: '' };
        });
        setSlides(newSlides);
        setLegenda(''); setHashtags([]); setPalavraGatilho(''); setActiveCarouselId(null); setError('');
        if (isMobile) setMobileTab('slides');
        showToast('Slides criados. Clique em ✏ para editar cada um.');
      };

      const handleGenerate = async () => {
        if (!client) { setError('Selecione ou crie uma médica primeiro.'); return; }
        if (!form.tema.trim()) { setError('Digite o tema do carrossel.'); return; }
        setError(''); setGenerating(true); setSlides([]); setLegenda(''); setHashtags([]); setPalavraGatilho(''); setActiveCarouselId(null);

        try {
          setProgress('Gerando copy com Claude...');
          const result = await generateCopy(form, client, session?.user?.email);
          setSlides(result.slides || []);
          setLegenda(result.legenda || '');
