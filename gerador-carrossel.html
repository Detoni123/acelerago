          setHashtags(result.hashtags || []);
          setPalavraGatilho(result.palavra_gatilho_dm || '');
          setProgress('');

          // Fase 1 completa — imagens ficam para fase 2 (manual por slide ou botão "Gerar todas")

        } catch (e) { setError(e.message || 'Erro ao gerar conteúdo'); }
        finally { setGenerating(false); setProgress(''); }
      };

      const handleRegen = async (slide, idx) => {
        if (!slide.prompt_imagem) { setError('Slide sem prompt de imagem. Edite o slide para adicionar um.'); return; }
        setGenImgIdx(idx); setError('');
        try {
          const fotoB64 = form.usarFotoMedica && client?.fotoRostoUrl
            ? client.fotoRostoUrl.replace(/^data:image\/[^;]+;base64,/, '') : null;
          const imgData = await generateImage(buildImagePrompt(slide), fotoB64);
          setSlides(prev => prev.map((s,i) => i===idx ? {...s, imageData: imgData, imageUrl: null} : s));
        } catch (e) { setError(e.message); }
        finally { setGenImgIdx(-1); }
      };

      const handleGenerateAllImages = async () => {
        setError('');
        const fotoB64 = form.usarFotoMedica && client?.fotoRostoUrl
          ? client.fotoRostoUrl.replace(/^data:image\/[^;]+;base64,/, '') : null;
        const updated = [...slides];
        for (let i = 0; i < updated.length; i++) {
          if (updated[i].prompt_imagem) {
            try {
              setProgress(`Gerando imagem ${i+1} de ${updated.length}...`);
              setGenImgIdx(i);
              const imgData = await generateImage(buildImagePrompt(updated[i]), fotoB64);
              updated[i] = { ...updated[i], imageData: imgData, imageUrl: null };
              setSlides([...updated]);
            } catch (e) { console.warn(`Slide ${i+1}:`, e.message); }
          }
        }
        setGenImgIdx(-1); setProgress('');
      };

      const handleDownloadAll = async () => {
        if (!client || !slides.length) return;
        setDownloading(true); setError('');
        try { await downloadAll(slides, client); }
        catch (e) { setError(e.message); }
        finally { setDownloading(false); }
      };

      const handleDownloadOne = async (slide, idx) => {
        if (!client) return;
        try { await downloadOne(slide, client, idx); }
        catch (e) { setError(e.message); }
      };

      const handleSaveViral = async () => {
        const nome = prompt('Nome para esta estrutura viral:');
        if (!nome?.trim()) return;
        const slideMeta = slides.map(s => ({ tipo:s.tipo, layout:s.layout||'inline', temTitulo:!!s.titulo, temImagem:hasSlideImage(s) }));
        const row = { nome: nome.trim(), formato: form.formato, num_slides: slides.length, criado: new Date().toLocaleDateString('pt-BR'), slides: slideMeta };
        const useAdmin = isAdmin && effectiveUserId !== session?.user?.id;
        let data, error;
        if (useAdmin) {
          const res = await adminCall('saveViral', effectiveUserId, { row });
          data = res.data;
        } else {
          const res = await sb.from('viral_structures').insert({ ...row, user_id: session.user.id }).select().single();
          data = res.data; error = res.error;
        }
        if (!error && data) {
          const entry = { id: data.id, nome: data.nome, formato: data.formato, numSlides: data.num_slides, criado: data.criado, slides: data.slides };
          setViralStructures(prev => [entry, ...prev]);
          showToast('⚡ Estrutura viral salva!');
        }
      };

      const handleApplyViral = (estrutura) => {
        const fmt = FORMATS.find(f=>f.id===estrutura.formato);
        setF('formato', estrutura.formato);
        setF('numSlides', estrutura.numSlides);
        const hint = `Formato salvo: ${fmt?.label||estrutura.formato} (${estrutura.numSlides} slides). Insira o tema e clique em Gerar Copy.`;
        setError(''); setProgress(hint);
        setTimeout(() => setProgress(''), 4000);
      };

      const handleDeleteViral = async (id) => {
        if (isAdmin && effectiveUserId !== session?.user?.id) {
          await adminCall('deleteViral', effectiveUserId, { id });
        } else {
          await sb.from('viral_structures').delete().eq('id', id);
        }
        setViralStructures(prev => prev.filter(v => v.id !== id));
      };

      const handleSaveCarousel = async () => {
        if (!slides.length) return;
        const savedAt = new Date().toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
        const useAdmin = isAdmin && effectiveUserId !== session?.user?.id;
        const ownerId = useAdmin ? effectiveUserId : session.user.id;

        let nomeVal = null;
        let carouselId = activeCarouselId;
        if (!carouselId) {
          const nomeDefault = form.tema || 'Carrossel sem nome';
          const nome = prompt('Nome para este carrossel:', nomeDefault);
          if (nome === null) { showToast('Salvamento cancelado.'); return; }
          nomeVal = nome.trim() || nomeDefault;
          carouselId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
        }

        try {
          const totalUploads = slides.filter(s => s.imageData).length;
          let uploadedCount = 0;
          if (totalUploads) setProgress(`Subindo imagem 1 de ${totalUploads}...`);

          const slidesForDB = [];
          const slidesForState = [];
          const keptPaths = new Set();
          for (let i = 0; i < slides.length; i++) {
            const { imageData, ...rest } = slides[i];
            if (imageData) {
              uploadedCount++;
              setProgress(`Subindo imagem ${uploadedCount} de ${totalUploads}...`);
              const res = await uploadSlideImage(imageData, ownerId, carouselId, i);
              if (res) {
                slidesForDB.push({ ...rest, imageUrl: res.url, imageVersion: res.version });
                slidesForState.push({ ...slides[i], imageUrl: res.url, imageVersion: res.version });
                keptPaths.add(`${ownerId}/${carouselId}/slide-${i}.jpg`);
              } else {
                slidesForDB.push(rest);
                slidesForState.push(slides[i]);
              }
            } else {
              slidesForDB.push(rest);
              slidesForState.push(slides[i]);
              if (rest.imageUrl) {
                const m = rest.imageUrl.match(/\/slide-(\d+)\.(jpg|png)/);
                if (m) keptPaths.add(`${ownerId}/${carouselId}/slide-${m[1]}.${m[2]}`);
              }
            }
          }

          if (activeCarouselId) {
            setProgress('Limpando arquivos antigos...');
            const existing = await listCarouselFiles(ownerId, carouselId);
            const orphans = existing.filter(p => !keptPaths.has(p));
            if (orphans.length) await removeStorageFiles(orphans);
          }
          setProgress('');

          const row = { client_nome: client?.nome || '', saved_at: savedAt, updated_at: new Date().toISOString(), form: { ...form }, slides: slidesForDB, legenda, hashtags, palavra_gatilho: palavraGatilho };

          if (activeCarouselId) {
            if (useAdmin) {
              const { data } = await adminCall('saveCarousel', effectiveUserId, { id: activeCarouselId, row });
              if (data) {
                setSlides(slidesForState);
                setSavedCarousels(prev => prev.map(c => c.id === activeCarouselId ? { ...c, ...row, slides: slidesForDB, palavraGatilho } : c));
                showToast('💾 Carrossel atualizado!');
              }
            } else {
              const { data: updated, error } = await sb.from('saved_carousels').update({ ...row, user_id: session.user.id }).eq('id', activeCarouselId).select();
              if (error) throw new Error(error.message);
              if (!updated?.length) throw new Error('Salvar falhou: sem permissão ou ID inválido.');
              setSlides(slidesForState);
              setSavedCarousels(prev => prev.map(c => c.id === activeCarouselId ? { ...c, ...row, slides: slidesForDB, palavraGatilho } : c));
              showToast('💾 Carrossel atualizado!');
            }
          } else {
            if (useAdmin) {
              const { data } = await adminCall('saveCarousel', effectiveUserId, { id: null, row: { ...row, id: carouselId, nome: nomeVal } });
              if (data) {
                setSlides(slidesForState);
                const entry = { id: data.id, nome: data.nome, clientNome: data.client_nome, savedAt: data.saved_at, form: data.form, slides: slidesForDB, legenda, hashtags, palavraGatilho };
                setSavedCarousels(prev => [entry, ...prev]);
                setActiveCarouselId(data.id);
                showToast('💾 Carrossel salvo!');
              }
            } else {
              const { data, error } = await sb.from('saved_carousels').insert({ ...row, id: carouselId, user_id: session.user.id, nome: nomeVal }).select().single();
              if (error) throw new Error(error.message);
              setSlides(slidesForState);
              const entry = { id: data.id, nome: data.nome, clientNome: data.client_nome, savedAt: data.saved_at, form: data.form, slides: slidesForDB, legenda, hashtags, palavraGatilho };
              setSavedCarousels(prev => [entry, ...prev]);
              setActiveCarouselId(data.id);
              showToast('💾 Carrossel salvo!');
            }
          }
          setSavedOpen(true);
        } catch (e) {
          setProgress('');
          setError(`Erro ao salvar: ${e.message}`);
        }
      };

      const handleLoadCarousel = (entry) => {
        if (!confirm(`Carregar "${entry.nome}"? O carrossel atual será substituído.`)) return;
        const storedImages = LS.get(`carouselImg_${entry.id}`, {});
        const slidesWithImages = (entry.slides || []).map((s, i) => {
          if (s.imageUrl) return s;
          if (storedImages[i]) return { ...s, imageData: storedImages[i] };
          return s;
        });
        setForm(entry.form);
        setSlides(slidesWithImages);
        setLegenda(entry.legenda);
        setHashtags(entry.hashtags);
        setPalavraGatilho(entry.palavraGatilho);
        setActiveCarouselId(entry.id);
        setSavedOpen(false);

        const needsMigration = slidesWithImages.some(s => s.imageData && !s.imageUrl);
        if (needsMigration) migrateLegacyImages(entry, slidesWithImages);
      };

      const migrateLegacyImages = async (entry, currentSlides) => {
        const useAdmin = isAdmin && effectiveUserId !== session?.user?.id;
        const ownerId = useAdmin ? effectiveUserId : session.user.id;
        try {
          showToast('Migrando imagens para o Storage...');
          const migrated = [];
          let changed = false;
          for (let i = 0; i < currentSlides.length; i++) {
            const s = currentSlides[i];
            if (s.imageData && !s.imageUrl) {
              const res = await uploadSlideImage(s.imageData, ownerId, entry.id, i);
              if (res) {
                migrated.push({ ...s, imageUrl: res.url, imageVersion: res.version });
                changed = true;
              } else {
                migrated.push(s);
              }
            } else {
              migrated.push(s);
            }
          }
          if (!changed) return;
          const slidesForDB = migrated.map(({ imageData, ...rest }) => rest);
          const rowPatch = { slides: slidesForDB, updated_at: new Date().toISOString() };
          if (useAdmin) {
            await adminCall('saveCarousel', effectiveUserId, { id: entry.id, row: rowPatch });
          } else {
            await sb.from('saved_carousels').update(rowPatch).eq('id', entry.id);
          }
          setSlides(prev => prev === currentSlides ? migrated : prev.map((s, i) => migrated[i]?.imageUrl && !s.imageUrl ? { ...s, imageUrl: migrated[i].imageUrl, imageVersion: migrated[i].imageVersion } : s));
          setSavedCarousels(prev => prev.map(c => c.id === entry.id ? { ...c, slides: slidesForDB } : c));
          localStorage.removeItem(`carouselImg_${entry.id}`);
          showToast('✅ Imagens migradas com sucesso');
        } catch (e) {
          console.warn('Migração falhou:', e.message);
        }
      };

      const handleDeleteCarousel = async (id) => {
        const useAdmin = isAdmin && effectiveUserId !== session?.user?.id;
        const ownerId = useAdmin ? effectiveUserId : session.user.id;
        const files = await listCarouselFiles(ownerId, id);
        if (files.length) await removeStorageFiles(files);
        if (useAdmin) {
          await adminCall('deleteCarousel', effectiveUserId, { id });
        } else {
          await sb.from('saved_carousels').delete().eq('id', id);
        }
        localStorage.removeItem(`carouselImg_${id}`);
        setSavedCarousels(prev => prev.filter(c => c.id !== id));
      };

      const handleGeneratePauta = async () => {
        if (!client) { setError('Selecione uma médica primeiro.'); return; }
        if (!pautaForm.temas.trim()) { setError('Informe os temas do mês.'); return; }
        setGeneratingPauta(true); setPautaSuggestions([]);
        const systemPauta = `Você é estrategista de conteúdo para médicas de saúde da mulher no Brasil. Crie pautas de Instagram objetivas. Retorne APENAS JSON válido.`;
        const userPauta = `Crie uma pauta de 12 posts de Instagram para ${client.nome} (${client.especialidade}) para o próximo mês.
Temas principais do mês: ${pautaForm.temas}

Retorne exatamente:
{"posts":[{"semana":1,"tema":"tema curto","formato":"alerta|analogia|noticia|serie|diagnostico|virada","gancho":"uma frase de gancho","palavraGatilho":"PALAVRA"},...12 posts]}`;
        try {
          const res = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2048, system:systemPauta, messages:[{role:'user',content:userPauta}] }) });
          const data = await res.json();
          const txt = data.content[0].text.trim();
          const match = txt.match(/\{[\s\S]*\}/);
          if (match) { const j = JSON.parse(match[0]); setPautaSuggestions(j.posts||[]); }
        } catch(e) { setError(e.message); }
        finally { setGeneratingPauta(false); }
      };

      if (authLoading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--l-bg)',color:'var(--l-label)',fontSize:14}}>Carregando...</div>;
      if (!session) return <LoginScreen />;

      return (
        <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

          {/* TOP BAR */}
          <div style={{background:'#1E293B',borderBottom:'1px solid rgba(255,255,255,0.08)',padding:isMobile?'0 12px':'0 20px',height:isMobile?50:58,display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:28,height:28,background:ORANGE,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:12}}>A</div>
              <span style={{fontWeight:700,fontSize:isMobile?13:15}}>Gerador de Carrossel</span>
              {!isMobile && <span style={{color:'rgba(255,255,255,0.45)',fontSize:11,fontWeight:400}}>AceleraGO · uso interno</span>}
            </div>
            <div style={{flex:1}} />
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'nowrap'}}>
              {isAdmin && !isMobile && allProfiles.length > 0 && (
                <div style={{display:'flex',alignItems:'center',gap:5,background:'rgba(244,117,48,0.08)',border:'1px solid rgba(244,117,48,0.2)',borderRadius:7,padding:'0 8px',height:32}}>
                  <span style={{fontSize:10,color:'rgba(255,255,255,0.5)',flexShrink:0}}>Como:</span>
                  <select
                    value={activeClientId || ''}
                    onChange={e => handleSelectClient(e.target.value)}
                    style={{background:'transparent',border:'none',color:ORANGE,fontFamily:'Sora,sans-serif',fontSize:11,fontWeight:600,cursor:'pointer',outline:'none',maxWidth:160}}>
                    {allProfiles.map(p => (
                      <option key={p.user_id} value={p.user_id} style={{background:'#0D1928',color:'#fff'}}>
                        {p.nome || 'Sem nome'}
                      </option>
                    ))}
                  </select>
                </div>
              )}
              {!isMobile && !isAdmin && profile?.nome && <span style={{fontSize:13,color:'rgba(255,255,255,0.7)'}}>{profile.nome}</span>}
              <button onClick={()=>{setEditClient(client||profile);setModal('client');}} style={{...S.btnS,height:32,padding:'0 10px',fontSize:11,whiteSpace:'nowrap'}}>✏ Perfil</button>
              <button onClick={()=>{ applyTheme(!dark); setDark(!dark); }} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:7,height:32,width:32,color:'rgba(255,255,255,0.8)',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}} title={dark?'Modo claro':'Modo escuro'}>{dark ? '☀' : '☾'}</button>
              <button onClick={handleLogout} style={{background:'rgba(255,255,255,0.08)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:7,height:32,padding:'0 10px',color:'rgba(255,255,255,0.7)',cursor:'pointer',fontFamily:'Sora,sans-serif',fontSize:11}}>Sair</button>
            </div>
          </div>

          {/* LAYOUT */}
          <div style={{display:'flex',flex:1,minHeight:0}}>

            {/* LEFT PANEL */}
            <div style={{width:isMobile?'100%':290,background:'var(--l-surf)',borderRight:isMobile?'none':'1px solid var(--l-border)',overflowY:'auto',padding:20,display:isMobile&&mobileTab==='slides'?'none':'flex',flexDirection:'column',gap:18,flexShrink:0}}>

              <div style={{fontSize:9,letterSpacing:'0.1em',color:'var(--l-label)',textTransform:'uppercase',fontWeight:600}}>Configurar</div>

              {isAdmin && isMobile && (
                <div style={{background:'rgba(244,117,48,0.06)',border:'1px solid rgba(244,117,48,0.2)',borderRadius:10,padding:'12px 14px'}}>
                  <div style={{fontSize:10,color:'var(--l-label)',marginBottom:6,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}>Gerenciando como</div>
                  {adminError ? (
                    <div style={{fontSize:11,color:'#fca5a5',background:'rgba(220,38,38,0.1)',borderRadius:6,padding:'8px 10px'}}>{adminError}</div>
                  ) : allProfiles.length === 0 ? (
                    <div style={{fontSize:11,color:'var(--l-label)'}}>Carregando perfis...</div>
                  ) : (
                    <select
                      value={activeClientId || ''}
                      onChange={e => handleSelectClient(e.target.value)}
                      style={{width:'100%',background:'rgba(244,117,48,0.06)',border:'1px solid rgba(244,117,48,0.3)',borderRadius:7,color:ORANGE,fontFamily:'Sora,sans-serif',fontSize:14,fontWeight:700,padding:'10px 12px',cursor:'pointer',outline:'none'}}>
                      {allProfiles.map(p => (
                        <option key={p.user_id} value={p.user_id} style={{background:'#1E293B',color:'#fff'}}>
                          {p.nome || 'Sem nome'}
                        </option>
                      ))}
                    </select>
                  )}
                </div>
              )}

              <div>
                <label style={S.label}>Formato</label>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  {FORMATS.map(f => (
                    <button key={f.id} onClick={()=>{ setF('formato',f.id); if(f.id==='virada') setF('numSlides',10); }} style={{background:form.formato===f.id?'rgba(244,117,48,0.1)':'var(--l-surf2)',border:`1px solid ${form.formato===f.id?ORANGE:'var(--l-border)'}`,borderRadius:7,padding:'9px 12px',color:form.formato===f.id?ORANGE:'var(--l-t2)',cursor:'pointer',textAlign:'left',fontFamily:'Sora,sans-serif'}}>
                      <div style={{fontSize:12,fontWeight:600}}>{f.label}</div>
                      <div style={{fontSize:10,color:'var(--l-label)',marginTop:2}}>{f.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label style={S.label}>Tema do Carrossel</label>
                <textarea style={{...S.input,resize:'vertical',minHeight:78,lineHeight:1.55}} value={form.tema} onChange={e=>setF('tema',e.target.value)} placeholder={"Ex: menopausa e ganho de peso\nEx: mitos sobre a pílula anticoncepcional"} />
              </div>

              <div>
                <label style={S.label}>Número de Slides</label>
                <div style={{display:'flex',gap:6}}>
                  {[5,8,10].map(n => (
                    <button key={n} onClick={()=>setF('numSlides',n)} style={{flex:1,background:form.numSlides===n?ORANGE:'var(--l-surf2)',border:`1px solid ${form.numSlides===n?ORANGE:'var(--l-border)'}`,borderRadius:7,padding:'9px',color:form.numSlides===n?'#fff':'var(--l-t2)',cursor:'pointer',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14}}>{n}</button>
                  ))}
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <Toggle label="Gerar imagens com Gemini" sub="Requer chave API Gemini" checked={form.gerarImagens} onChange={v=>setF('gerarImagens',v)} />
                <Toggle label="Usar foto da médica" sub="Insere o rosto nos prompts (Beta)" checked={form.usarFotoMedica} onChange={v=>setF('usarFotoMedica',v)} disabled={!client?.fotoRostoUrl} />
              </div>

              <div style={{height:1,background:'var(--l-border)'}} />
              <div style={{fontSize:9,letterSpacing:'0.1em',color:'var(--l-label)',textTransform:'uppercase',fontWeight:600}}>Ações</div>

              {error && (
                <div style={{background:'rgba(220,38,38,0.07)',border:'1px solid rgba(220,38,38,0.2)',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#DC2626',lineHeight:1.5}}>
                  <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                    <span style={{flexShrink:0,fontSize:14}}>⚠</span>
                    <span>{error}</span>
                  </div>
                  {(error.toLowerCase().includes('claude') || error.toLowerCase().includes('gemini') || error.toLowerCase().includes('api') || error.toLowerCase().includes('erro')) && (
                    <button onClick={slides.length===0 ? handleGenerate : handleGenerateAllImages} style={{...S.btnS,fontSize:11,padding:'5px 12px',marginTop:8,width:'100%',borderColor:'rgba(220,38,38,0.25)',color:'rgba(252,165,165,0.85)'}}>
                      ↺ Tentar novamente
                    </button>
                  )}
                </div>
              )}
              {progress && genImgIdx<0 && <div style={{background:'rgba(244,117,48,0.08)',border:'1px solid rgba(244,117,48,0.2)',borderRadius:7,padding:'10px 14px',fontSize:12,color:ORANGE}}>{progress}</div>}

              <button onClick={handleGenerate} disabled={generating||!client} style={{...S.btnP,opacity:generating||!client?0.45:1,fontSize:15,padding:'14px'}}>
                {generating ? 'Gerando copy...' : '✦ Fase 1: Gerar Copy'}
              </button>
              <button onClick={handleManualEntry} disabled={!client} style={{...S.btnG,width:'100%',padding:'11px',fontSize:13,opacity:!client?0.45:1}}>
                ✏ Entrada Manual
              </button>

              {slides.length > 0 && (
                <>
                  {genImgIdx>=0 ? (
                    <div style={{borderRadius:8,border:'1px solid rgba(244,117,48,0.25)',padding:'10px 12px',background:'rgba(244,117,48,0.05)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7,fontSize:11,color:ORANGE}}>
                        <span>Gerando imagens...</span>
                        <span style={{fontWeight:700}}>{genImgIdx+1}/{slides.length}</span>
                      </div>
                      <div style={{height:3,background:'var(--l-border)',borderRadius:2,overflow:'hidden'}}>
                        <div style={{width:`${((genImgIdx+1)/slides.length)*100}%`,height:3,background:ORANGE,borderRadius:2,transition:'width 0.4s ease'}} />
                      </div>
                    </div>
                  ) : (
                    <button onClick={handleGenerateAllImages} style={{...S.btnS,width:'100%',padding:'11px',fontSize:13,borderColor:'rgba(244,117,48,0.4)',color:ORANGE}}>
                      ⟳ Fase 2: Gerar Todas as Imagens
                    </button>
                  )}
                  <button onClick={handleSaveCarousel} style={{...S.btnS,width:'100%',padding:'11px',fontSize:13,borderColor:'#86EFAC',color:'#16A34A'}}>
                    {activeCarouselId ? '💾 Salvar alterações' : '💾 Salvar Carrossel (para editar depois)'}
                  </button>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={handleDownloadAll} disabled={downloading} style={{...S.btnS,flex:1,padding:'10px',fontSize:12,opacity:downloading?0.5:1}}>
                      {downloading ? 'Preparando...' : `↓ Baixar ZIP`}
                    </button>
                    <button onClick={handleSaveViral} style={{...S.btnS,padding:'10px 12px',fontSize:12,borderColor:'#FDE68A',color:'#D97706'}} title="Salvar apenas a estrutura (formato, nº slides)">
                      ⚡ Estrutura
                    </button>
                  </div>
                </>
              )}

              {(savedCarousels.length > 0 || viralStructures.length > 0) && (
                <>
                  <div style={{height:1,background:'var(--l-border)'}} />
                  <div style={{fontSize:9,letterSpacing:'0.1em',color:'var(--l-label)',textTransform:'uppercase',fontWeight:600}}>Histórico</div>
                </>
              )}

              {/* Pauta do Mês — primeiro no histórico */}
              <div>
                <button onClick={()=>setPautaOpen(p=>!p)} style={{...S.btnS,width:'100%',padding:'10px',fontSize:12,borderColor:'#BFDBFE',color:'#2563EB',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span>📅 Pauta do Mês</span>
                  <span style={{fontSize:10}}>{pautaOpen?'▲':'▼'}</span>
                </button>
                {pautaOpen && (
                  <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                    <textarea style={{...S.input,resize:'vertical',minHeight:60,fontSize:12}} value={pautaForm.temas} onChange={e=>setPautaForm({temas:e.target.value})} placeholder="Ex: menopausa, tireoide, emagrecimento hormonal" />
                    <button onClick={handleGeneratePauta} disabled={generatingPauta||!client} style={{...S.btnP,padding:'10px',fontSize:12,opacity:generatingPauta||!client?0.5:1}}>
                      {generatingPauta ? 'Gerando...' : '✦ Gerar 12 sugestões'}
                    </button>
                    {pautaSuggestions.length > 0 && (
                      <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:260,overflowY:'auto'}}>
                        {pautaSuggestions.map((p,i) => (
                          <div key={i} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:7,padding:'7px 10px',cursor:'pointer'}}
                            onClick={()=>{ setF('tema', p.tema); setF('formato', p.formato||'alerta'); setPautaOpen(false); }}>
                            <div style={{fontSize:11,color:'var(--l-t2)',marginBottom:2}}>Sem {p.semana} · {FORMATS.find(f=>f.id===p.formato)?.label||p.formato}</div>
                            <div style={{fontSize:12,fontWeight:600,color:'var(--l-t1)'}}>{p.tema}</div>
                            <div style={{fontSize:11,color:'var(--l-label)',marginTop:2,fontStyle:'italic'}}>{p.gancho}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Carrosseis Salvos */}
              {savedCarousels.length > 0 && (
                <div>
                  <button onClick={()=>setSavedOpen(p=>!p)} style={{...S.btnS,width:'100%',padding:'10px',fontSize:12,borderColor:'#86EFAC',color:'#16A34A',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span>💾 Carrosseis Salvos ({savedCarousels.length})</span>
                    <span style={{fontSize:10}}>{savedOpen?'▲':'▼'}</span>
                  </button>
                  {savedOpen && (
                    <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:4}}>
                      {savedCarousels.map(c => (
                        <div key={c.id} style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:7,padding:'8px 10px'}}>
                          <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
                            <div style={{flex:1,cursor:'pointer'}} onClick={()=>handleLoadCarousel(c)}>
                              <div style={{fontSize:12,fontWeight:600,color:'var(--l-t1)',lineHeight:1.3}}>{c.nome}</div>
                              <div style={{fontSize:10,color:'var(--l-label)',marginTop:3}}>{c.clientNome} · {c.slides.length} slides · {c.savedAt}</div>
                            </div>
                            <button onClick={()=>handleDeleteCarousel(c.id)} style={{...S.btnG,fontSize:14,padding:'0 4px',color:'var(--l-t3)',flexShrink:0}}>×</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* Estruturas Virais */}
              {viralStructures.length > 0 && (
                <div>
                  <label style={{...S.label,color:'#D97706'}}>Estruturas Virais Salvas</label>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {viralStructures.map(v => (
                      <div key={v.id} style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:7,padding:'7px 10px',display:'flex',alignItems:'center',gap:6}}>
                        <div style={{flex:1,cursor:'pointer'}} onClick={()=>handleApplyViral(v)}>
                          <div style={{fontSize:12,fontWeight:600,color:'var(--l-t1)'}}>{v.nome}</div>
                          <div style={{fontSize:10,color:'var(--l-label)',marginTop:2}}>{v.numSlides} slides · {v.criado}</div>
                        </div>
                        <button onClick={()=>handleDeleteViral(v.id)} style={{...S.btnG,fontSize:13,padding:'2px 5px',color:'var(--l-t3)'}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* SLIDES AREA */}
            <div style={{flex:1,overflowY:'auto',padding:isMobile?12:24,display:isMobile&&mobileTab==='config'?'none':'block',background:'var(--l-bg)'}}>
              {slides.length === 0 ? (
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,color:'#CBD5E1'}}>
                  <div style={{fontSize:52}}>◈</div>
                  <div style={{fontSize:15,textAlign:'center'}}>
                    {client ? `Pronto para gerar carrossel${isMobile?'':` para ${client.nome}`}` : 'Configure o carrossel e clique em Gerar Copy'}
                  </div>
                  {isMobile && client && (
                    <div style={{fontSize:12,color:'var(--l-label)',textAlign:'center'}}>Use a aba Configurar para escolher o tema</div>
                  )}
                </div>
              ) : (
                <>
                  <div style={{display:'flex',flexWrap:'wrap',gap:isMobile?12:18,alignContent:'flex-start',justifyContent:isMobile?'center':'flex-start'}}>
                    {slides.map((slide,i) => (
                      <SlideCard key={i} slide={slide} idx={i} scale={dynScale}
                        client={client}
                        onEdit={(sl,ix,silent) => { if(silent){setSlides(prev=>prev.map((s,j)=>j===ix?sl:s));}else{setEditSlide({slide:sl,idx:ix});}}}
                        onDownload={handleDownloadOne}
                        onRegen={handleRegen}
                        regenning={genImgIdx===i}
                        onUploadImage={(ix,b64)=>setSlides(prev=>prev.map((s,j)=>j===ix?{...s,imageData:b64,imageUrl:null}:s))}
                        onClearImage={(ix)=>setSlides(prev=>prev.map((s,j)=>j===ix?{...s,imageData:null,imageUrl:null}:s))}
                        onDelete={(ix)=>{ if(window.confirm(`Deletar slide ${ix+1}?`)) setSlides(prev=>prev.filter((_,j)=>j!==ix)); }}
                        onApplyLogoAll={(cfg)=>setSlides(prev=>prev.map(s=>({...s,logoEnabled:cfg.logoEnabled,logoX:cfg.logoX,logoY:cfg.logoY,logoSize:cfg.logoSize,logoOpacity:cfg.logoOpacity})))}
                      />
                    ))}
                  </div>
                  {/* Adicionar slide */}
                  <div style={{display:'flex',gap:6,marginTop:4}}>
                    {['conteudo','cta'].map(tipo=>(
                      <button key={tipo} onClick={()=>setSlides(prev=>[...prev,tipo==='cta'?{tipo:'cta',numero:prev.length+1,bgColor:null,textColor:null,accentColor:null,titulo:'',texto:'',palavra_gatilho:palavraGatilho||'COMENTE',ctaStyle:'gatilho'}:{tipo:'conteudo',numero:prev.length+1,layout:'texto',bgColor:null,textColor:null,accentColor:null,titulo:'',texto:''}])}
                        style={{padding:'10px 18px',fontSize:11,fontWeight:600,borderRadius:6,border:'1px dashed var(--l-border)',background:'transparent',color:'var(--l-t2)',cursor:'pointer',fontFamily:'Sora,sans-serif'}}>
                        ＋ {tipo === 'cta' ? 'Slide final' : 'Slide conteúdo'}
                      </button>
                    ))}
                  </div>
                  {legenda && (
                    <div style={{marginTop:28,maxWidth:660,background:'var(--l-surf)',border:'1px solid var(--l-border)',borderRadius:10,padding:'16px 20px',boxShadow:'0 2px 8px rgba(0,0,0,0.06)'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                        <span style={{fontSize:11,fontWeight:600,color:'var(--l-label)',textTransform:'uppercase',letterSpacing:'0.07em'}}>Legenda gerada</span>
                        <button onClick={()=>{navigator.clipboard.writeText(legenda+(hashtags.length?'\n\n'+hashtags.join(' '):''));showToast('Legenda copiada!');}} style={{...S.btnG,fontSize:11,color:ORANGE}}>Copiar tudo</button>
                      </div>
                      <div style={{fontSize:13,color:'var(--l-t2)',lineHeight:1.7,marginBottom:10,whiteSpace:'pre-wrap'}}>{legenda}</div>
                      {hashtags.length > 0 && <div style={{fontSize:12,color:ORANGE,lineHeight:1.9,marginBottom:8}}>{hashtags.join(' ')}</div>}
                      {palavraGatilho && (
                        <div style={{background:'rgba(244,117,48,0.1)',borderRadius:6,padding:'7px 12px',fontSize:12}}>
                          Palavra-gatilho DM: <strong style={{color:ORANGE}}>{palavraGatilho}</strong>
                        </div>
                      )}
                    </div>
                  )}
                </>
              )}
            </div>
          </div>

          {/* MOBILE BOTTOM TAB BAR */}
          {isMobile && (
            <div style={{height:56,display:'flex',borderTop:'1px solid var(--l-border)',background:'var(--l-surf)',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
              <button onClick={()=>setMobileTab('config')} style={{flex:1,background:'transparent',border:'none',borderTop:mobileTab==='config'?`2px solid ${ORANGE}`:'2px solid transparent',cursor:'pointer',fontFamily:'Sora,sans-serif',color:mobileTab==='config'?ORANGE:'var(--l-t3)',fontWeight:mobileTab==='config'?700:400,fontSize:11,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                <span style={{fontSize:17}}>⚙</span>
                <span>Configurar</span>
              </button>
              <div style={{width:1,background:'var(--l-border)',margin:'8px 0'}} />
              <button onClick={()=>setMobileTab('slides')} style={{flex:1,background:'transparent',border:'none',borderTop:mobileTab==='slides'?`2px solid ${ORANGE}`:'2px solid transparent',cursor:'pointer',fontFamily:'Sora,sans-serif',color:mobileTab==='slides'?ORANGE:'var(--l-t3)',fontWeight:mobileTab==='slides'?700:400,fontSize:11,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
                <span style={{fontSize:17}}>◈</span>
                <span>Slides{slides.length>0?` (${slides.length})`:''}</span>
              </button>
            </div>
          )}

          {/* MODALS */}
          {modal==='client'   && <ClientModal client={editClient} onSave={handleSaveClient} onClose={()=>{setModal(null);setEditClient(null);}} isMobile={isMobile} />}
          {editSlide && <EditModal slide={editSlide.slide} onSave={s=>{setSlides(prev=>prev.map((sl,i)=>i===editSlide.idx?s:sl));setEditSlide(null);}} onClose={()=>setEditSlide(null)} />}
          {toast && <Toast msg={toast} isMobile={isMobile} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
