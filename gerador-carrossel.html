<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Carrossel — AceleraGO</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sora', sans-serif; background: #060e18; color: #fff; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    select option { background: #0D1928; color: #fff; }
    textarea { font-family: 'Sora', sans-serif; }
    input[type=color] { padding: 2px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ORANGE = '#F47530';
    const DARK   = '#0D1928';
    const SW = 1080, SH = 1350;
    const SCALE = 0.30;

    const FORMATS = [
      { id: 'alerta',     label: 'Alerta de Indústria',      desc: '"A morte de / O fim de..." — FOMO profissional' },
      { id: 'analogia',   label: 'Analogia Cultural',        desc: 'Pop culture + problema médico' },
      { id: 'noticia',    label: 'Notícia Urgente',          desc: 'Estudo recente como gancho de credibilidade' },
      { id: 'serie',      label: 'Celebridade + Você',       desc: 'Famosa com o mesmo problema da paciente' },
      { id: 'diagnostico',label: 'Diagnóstico de Erro',      desc: '"Você está fazendo X errado" + 5 passos' },
    ];

    const FONTS = ['Sora', 'Arial', 'Georgia', 'Trebuchet MS', 'Verdana'];

    const LAYOUTS = [
      { id:'inline', label:'Imagem + Texto' },
      { id:'texto',  label:'Só Texto' },
      { id:'lateral',label:'Lado a Lado' },
    ];

    const DEFAULT_FORBIDDEN = [
      'cura','milagre','garanto','resultado garantido','melhor médica',
      'número 1','antes e depois','compare','tratamento definitivo','curo'
    ];

    const LS = {
      get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
    };

    /* ── GEMINI IMAGE GENERATION ── */
    async function generateImage(prompt, key, fotoBase64 = null) {
      const model = 'gemini-3.1-flash-image-preview';
      const parts = fotoBase64
        ? [{ inlineData: { mimeType: 'image/jpeg', data: fotoBase64 } },
           { text: prompt + ' Integre o rosto desta pessoa à cena de forma natural e editorial, como se ela fosse a protagonista da foto.' }]
        : [{ text: prompt }];
      const res = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-gemini-key': key },
        body: JSON.stringify({
          model,
          payload: {
            contents: [{ parts }],
            generationConfig: { responseModalities: ['IMAGE'] }
          }
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `Gemini ${res.status}`); }
      const data = await res.json();
      const part = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
      if (!part) throw new Error('Gemini não retornou imagem');
      return part.inlineData.data;
    }

    /* ── CLAUDE COPY GENERATION ── */
    async function generateCopy(form, client, claudeKey) {
      const fmt = FORMATS.find(f => f.id === form.formato);
      const forbidden = (client.palavrasProibidas || DEFAULT_FORBIDDEN).join(', ');
      const n = form.numSlides;

      const system = `Você é especialista em criação de carrosseis de Instagram para médicas especialistas em saúde da mulher no Brasil.

REGRAS ABSOLUTAS DO CFM:
1. NUNCA prometer cura, resultado garantido ou tempo específico
2. NUNCA comparar com outros médicos ou tratamentos
3. NUNCA usar linguagem de "antes e depois"
4. NUNCA afirmar ser "melhor", "número 1" ou similar
5. Toda afirmação clínica deve ter base científica
6. Conteúdo educativo, não propaganda direta de serviço
7. NUNCA usar travessão (—) em nenhum texto

PALAVRAS PROIBIDAS: ${forbidden}

PERFIL DA MÉDICA:
- Nome: ${client.nome || 'Dra.'}
- Especialidade: ${client.especialidade || ''}
- Nicho: ${client.nicho || client.especialidade || ''}
- Tom de voz: ${client.tomVoz || 'Acolhedor, científico, direto, sem exageros'}

ESTRUTURA DOS SLIDES DE CONTEÚDO:
- Slides de conteúdo NÃO precisam de título. O texto é o protagonista.
- Cada slide de conteúdo traz UMA ideia. Uma frase forte OU 2-3 frases curtas.
- Quando usar título: apenas quando o slide apresenta um conceito que precisa ser nomeado (ex: "O que é perimenopause?"). Nos demais, omita.

LIMITES OBRIGATÓRIOS DE TEXTO (respeite sem exceção):
- Texto de slide de conteúdo: MÁXIMO 45 PALAVRAS
- Título de slide (quando usar): MÁXIMO 6 PALAVRAS
- Texto de CTA: MÁXIMO 12 PALAVRAS
- Headline de capa: MÁXIMO 8 PALAVRAS
- Subtítulo de capa: MÁXIMO 8 PALAVRAS
- Hashtags: EXATAMENTE 5. Não mais, não menos.
Slides de carrossel são visuais. Menos texto = mais impacto. Seja cirúrgico.

Retorne APENAS JSON válido. Sem markdown, sem texto antes ou depois do JSON.`;

      const slideGuide = buildSlideGuide(n);

      const user = `Crie ${n} slides de carrossel para o seguinte tema:

TEMA: ${form.tema}
FORMATO: ${fmt.label} — ${fmt.desc}

${slideGuide}

Para cada slide, crie um prompt_imagem em PORTUGUÊS, específico e detalhado para o Gemini gerar uma foto editorial de alta qualidade. O prompt deve descrever: (1) a cena exata e emoção relacionada ao conteúdo do slide, (2) o perfil da pessoa (mulher brasileira de 25 a 35 anos, contexto de ${client.especialidade || 'saúde'}), (3) iluminação e ambiente, (4) estilo fotográfico. Nunca inclua texto na imagem. Exemplo de bom prompt: "Fotografia editorial de uma mulher brasileira de 30 anos sentada em consultório médico, expressão serena e esperançosa, luz natural suave pela janela, médica ao fundo desfocada, estilo fotojornalismo médico, cores quentes".

Retorne exatamente este JSON:
{
  "slides": [
    {
      "numero": 1,
      "tipo": "capa",
      "headline": "texto impactante de até 60 chars",
      "destaque": "UMA PALAVRA ou FRASE CURTA em maiúsculas",
      "subtitulo": "frase de apoio curta",
      "prompt_imagem": "Fotografia editorial de [cena específica e emoção do tema], mulher brasileira de [25 a 35 anos], [contexto/expressão], [iluminação], [ambiente], estilo fotojornalismo médico, sem texto na imagem"
    },
    {
      "numero": 2,
      "tipo": "conteudo",
      "texto": "uma frase de impacto OU 2-3 frases curtas, máximo 45 palavras no total",
      "prompt_imagem": "..."
    },
    ...slides intermediários com tipo conteudo (título é OPCIONAL — omita quando o texto já for auto-suficiente)...
    {
      "numero": ${n},
      "tipo": "cta",
      "texto": "chamada para ação direta (MÁXIMO 12 PALAVRAS)",
      "palavra_gatilho": "PALAVRA",
      "beneficio": "o que a paciente recebe ao comentar",
      "prompt_imagem": "..."
    }
  ],
  "legenda": "legenda completa para o post com emojis estratégicos (máx 2200 chars, sem travessão)",
  "hashtags": ["#hashtag1", "#hashtag2", "#hashtag3", "#hashtag4", "#hashtag5"],
  "palavra_gatilho_dm": "PALAVRA"
}`;

      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-claude-key': claudeKey
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          system,
          messages: [{ role: 'user', content: user }]
        })
      });

      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || `Claude ${res.status}`); }
      const data = await res.json();
      const text = data.content[0].text.trim();
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Claude não retornou JSON válido');
      return JSON.parse(match[0]);
    }

    function buildSlideGuide(n) {
      const lines = ['ESTRUTURA DOS SLIDES:'];
      lines.push('Slide 1 (CAPA): gancho emocional forte, headline de impacto, palavra destaque em caixa alta');
      lines.push('Slide 2: validar a dor da paciente ("você não está sozinha")');
      if (n >= 8) lines.push('Slide 3: ampliar o problema com dado científico ou estatística');
      const mid = n <= 5 ? '3-4' : n <= 8 ? '4-7' : '4-8';
      lines.push(`Slides ${mid}: conteúdo com 1 ideia por slide, linguagem acessível, sem jargão excessivo — título máx 6 palavras, texto máx 45 palavras`);
      if (n >= 8) lines.push(`Slide ${n-1}: autoridade da médica + credenciais relevantes`);
      lines.push(`Slide ${n} (CTA): palavra-gatilho para DM bot + benefício concreto de responder`);
      return lines.join('\n');
    }

    /* ── CANVAS EXPORT ── */
    function wrapText(ctx, text, x, y, maxW, lh) {
      if (!text) return y;
      const words = text.split(' ');
      let line = '';
      let cy = y;
      for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (ctx.measureText(test).width > maxW && i > 0) {
          ctx.fillText(line.trimEnd(), x, cy);
          line = words[i] + ' ';
          cy += lh;
        } else { line = test; }
      }
      if (line.trim()) ctx.fillText(line.trimEnd(), x, cy);
      return cy + lh;
    }

    function adaptFs(text, max, min) {
      if (!text) return max;
      if (text.length > 60) return min;
      if (text.length > 35) return Math.round((max + min) / 2);
      return max;
    }

    async function drawImage(ctx, b64) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => { ctx.drawImage(img, 0, 0, SW, SH); resolve(); };
        img.onerror = resolve;
        img.src = `data:image/png;base64,${b64}`;
      });
    }

    async function renderToCanvas(slide, client) {
      await document.fonts.ready;
      const canvas = document.createElement('canvas');
      canvas.width = SW; canvas.height = SH;
      const ctx = canvas.getContext('2d');
      const cp = client.corPrimaria || ORANGE;
      const cs = client.corSecundaria || DARK;
      const font = client.fonte || 'Sora';
      const PAD = 90;

      if (slide.tipo === 'capa') {
        /* ── CAPA: image top, gradient overlay, text bottom ── */
        ctx.fillStyle = slide.bgColor || cs;
        ctx.fillRect(0, 0, SW, SH);
        if (slide.imageData) await drawImage(ctx, slide.imageData);

        const textPos = slide.textPosition || 'bottom';
        if (textPos === 'middle') {
          const radGrad = ctx.createRadialGradient(SW/2, SH/2, 0, SW/2, SH/2, SH * 0.72);
          radGrad.addColorStop(0, 'rgba(6,14,24,0.85)');
          radGrad.addColorStop(0.6, 'rgba(6,14,24,0.45)');
          radGrad.addColorStop(1, 'rgba(6,14,24,0.1)');
          ctx.fillStyle = radGrad;
        } else {
          const grad = ctx.createLinearGradient(0, 0, 0, SH);
          grad.addColorStop(0,   'rgba(6,14,24,0.05)');
          grad.addColorStop(0.35,'rgba(6,14,24,0.40)');
          grad.addColorStop(0.65,'rgba(6,14,24,0.90)');
          grad.addColorStop(1,   'rgba(6,14,24,0.98)');
          ctx.fillStyle = grad;
        }
        ctx.fillRect(0, 0, SW, SH);

        // slide count top-right
        ctx.fillStyle = 'rgba(255,255,255,0.22)';
        ctx.font = `400 30px ${font}`;
        ctx.textAlign = 'right';
        ctx.fillText('1 / deslize →', SW - PAD, 80);

        // destaque (small label above headline)
        let y = textPos === 'middle' ? SH / 2 - 220 : SH - 520;
        if (slide.destaque) {
          ctx.fillStyle = cp;
          ctx.font = `800 52px ${font}`;
          ctx.textAlign = 'left';
          ctx.fillText(slide.destaque.toUpperCase(), PAD, y);
          y += 80;
        }

        // headline
        const hSize = adaptFs(slide.headline, 88, 58);
        const tc = slide.textColor || '#ffffff';
        ctx.fillStyle = tc;
        ctx.font = `700 ${hSize}px ${font}`;
        ctx.textAlign = 'left';
        y = wrapText(ctx, slide.headline || '', PAD, y, SW - PAD*2, Math.round(hSize * 1.22));
        y += 24;

        // subtitulo
        if (slide.subtitulo) {
          ctx.fillStyle = slide.textColor ? tc + '99' : 'rgba(255,255,255,0.58)';
          ctx.font = `400 38px ${font}`;
          ctx.textAlign = 'left';
          y = wrapText(ctx, slide.subtitulo, PAD, y, SW - PAD*2, 56);
          y += 16;
        }

        // branding bar
        y += 20;
        ctx.fillStyle = cp;
        ctx.beginPath(); ctx.arc(PAD + 8, y + 8, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = cp;
        ctx.font = `700 28px ${font}`;
        ctx.textAlign = 'left';
        ctx.fillText(client.instagram ? `@${client.instagram.replace(/^@/,'')}` : (client.nome || ''), PAD + 28, y + 16);

      } else if (slide.tipo === 'cta') {
        /* ── CTA: solid primary color, no image ── */
        ctx.fillStyle = cp;
        ctx.fillRect(0, 0, SW, SH);
        // subtle diagonal shadow
        const grad2 = ctx.createLinearGradient(0, 0, SW, SH);
        grad2.addColorStop(0, 'rgba(0,0,0,0.12)');
        grad2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad2;
        ctx.fillRect(0, 0, SW, SH);

        let cy = 260;
        if (slide.texto) {
          const tSize = adaptFs(slide.texto, 60, 44);
          ctx.fillStyle = '#ffffff';
          ctx.font = `700 ${tSize}px ${font}`;
          ctx.textAlign = 'center';
          cy = wrapText(ctx, slide.texto, SW/2, cy, SW - PAD*2, Math.round(tSize*1.3));
          cy += 60;
        }

        // trigger word box
        const word = (slide.palavra_gatilho || 'COMENTE').toUpperCase();
        ctx.font = `800 100px ${font}`;
        const wm = ctx.measureText(word);
        const bw = wm.width + 120, bh = 150, bx = (SW - bw)/2, by = cy;
        ctx.fillStyle = cs;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 24); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.fillText(word, SW/2, by + 108);
        cy = by + bh + 56;

        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.font = `400 40px ${font}`;
        ctx.textAlign = 'center';
        ctx.fillText('Comente esta palavra abaixo', SW/2, cy);
        cy += 56;

        if (slide.beneficio) {
          ctx.fillStyle = 'rgba(255,255,255,0.65)';
          ctx.font = `400 34px ${font}`;
          ctx.textAlign = 'center';
          wrapText(ctx, `e receba: ${slide.beneficio}`, SW/2, cy, SW - PAD*2, 50);
        }

      } else {
        /* ── CONTEÚDO ── */
        const layout = slide.layout || 'inline';
        ctx.fillStyle = slide.bgColor || cs;
        ctx.fillRect(0, 0, SW, SH);
        ctx.fillStyle = cp;
        ctx.fillRect(0, 0, SW, 8);

        // number + line
        ctx.fillStyle = cp;
        ctx.font = `800 40px ${font}`;
        ctx.textAlign = 'left';
        ctx.fillText(`0${slide.numero}`, PAD, 130);
        ctx.fillStyle = `${cp}40`;
        ctx.fillRect(PAD + 100, 112, SW - PAD*2 - 100, 3);

        const stc = slide.textColor || '#ffffff';
        const drawTitle = async (y) => {
          if (!slide.titulo) return y;
          const tSize = adaptFs(slide.titulo, 76, 52);
          ctx.fillStyle = stc;
          ctx.font = `700 ${tSize}px ${font}`;
          ctx.textAlign = 'left';
          return wrapText(ctx, slide.titulo, PAD, y, SW - PAD*2, Math.round(tSize*1.2)) + 30;
        };
        const drawBody = (y, color, size, lh) => {
          if (!slide.texto) return y;
          ctx.fillStyle = slide.textColor ? stc + 'cc' : color;
          ctx.font = `400 ${size}px ${font}`;
          ctx.textAlign = 'left';
          return wrapText(ctx, slide.texto, PAD, y, SW - PAD*2, lh);
        };
        const drawCounter = () => {
          ctx.fillStyle = 'rgba(255,255,255,0.18)';
          ctx.font = `400 32px ${font}`;
          ctx.textAlign = 'right';
          ctx.fillText(`${slide.numero} →`, SW - PAD, SH - 80);
        };

        if (layout === 'lateral') {
          let ty = 200;
          ty = await drawTitle(ty);
          drawBody(ty, 'rgba(255,255,255,0.78)', 40, 62);
          if (slide.imageData) {
            const img = new Image();
            await new Promise(r => {
              img.onload = () => { ctx.drawImage(img, SW/2 + 20, 8, SW/2 - 20, SH - 8); r(); };
              img.onerror = r;
              img.src = `data:image/png;base64,${slide.imageData}`;
            });
          }
          drawCounter();

        } else if (layout === 'texto') {
          const textY = slide.titulo ? 220 : 300;
          let ty = await drawTitle(textY);
          drawBody(ty, '#ffffff', 58, 88);
          drawCounter();

        } else {
          // inline (default)
          let ty = await drawTitle(220);
          if (slide.imageData) {
            const imgH = 380;
            ctx.save();
            ctx.beginPath();
            ctx.roundRect(PAD, ty, SW - PAD*2, imgH, 18);
            ctx.clip();
            const img = new Image();
            await new Promise(r => {
              img.onload = () => { ctx.drawImage(img, PAD, ty, SW - PAD*2, imgH); r(); };
              img.onerror = r;
              img.src = `data:image/png;base64,${slide.imageData}`;
            });
            ctx.restore();
            ty += imgH + 40;
          }
          drawBody(ty, 'rgba(255,255,255,0.72)', 44, 68);
          drawCounter();
        }
      }

      return canvas;
    }

    async function downloadAll(slides, client) {
      const zip = new JSZip();
      for (let i = 0; i < slides.length; i++) {
        const canvas = await renderToCanvas(slides[i], client);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        zip.file(`slide-${String(i+1).padStart(2,'0')}.png`, blob);
      }
      const content = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(content);
      a.download = `carrossel-${Date.now()}.zip`;
      a.click();
    }

    async function downloadOne(slide, client, i) {
      const canvas = await renderToCanvas(slide, client);
      const a = document.createElement('a');
      a.href = canvas.toDataURL('image/png');
      a.download = `slide-${String(i+1).padStart(2,'0')}.png`;
      a.click();
    }

    /* ── STYLES ── */
    const S = {
      overlay: { position:'fixed', inset:0, background:'rgba(0,0,0,0.78)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:999 },
      modal: { background:'#0D1928', border:'1px solid rgba(255,255,255,0.1)', borderRadius:16, padding:32, width:'100%', maxWidth:540, maxHeight:'90vh', overflowY:'auto' },
      input: { width:'100%', background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.14)', borderRadius:8, padding:'10px 14px', color:'#fff', fontFamily:'Sora,sans-serif', fontSize:14, outline:'none' },
      label: { display:'block', fontSize:11, fontWeight:600, color:'rgba(255,255,255,0.45)', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.06em' },
      btnP: { background:ORANGE, color:'#fff', border:'none', borderRadius:10, padding:'13px 22px', fontFamily:'Sora,sans-serif', fontWeight:700, fontSize:15, cursor:'pointer', width:'100%' },
      btnS: { background:'rgba(255,255,255,0.07)', color:'#fff', border:'1px solid rgba(255,255,255,0.13)', borderRadius:8, padding:'10px 18px', fontFamily:'Sora,sans-serif', fontWeight:600, fontSize:13, cursor:'pointer' },
      btnG: { background:'transparent', color:'rgba(255,255,255,0.45)', border:'none', fontFamily:'Sora,sans-serif', fontSize:12, cursor:'pointer', padding:'4px 8px' },
    };

    /* ── SETTINGS MODAL ── */
    function SettingsModal({ onClose }) {
      const [ck, setCk] = useState(LS.get('claudeKey', ''));
      const [gk, setGk] = useState(LS.get('geminiKey', ''));
      const save = () => { LS.set('claudeKey', ck); LS.set('geminiKey', gk); onClose(); };
      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={S.modal} onClick={e => e.stopPropagation()}>
            <h2 style={{fontSize:19,fontWeight:700,marginBottom:24}}>Configurações de API</h2>
            <div style={{marginBottom:18}}>
              <label style={S.label}>Chave API Claude (Anthropic) — copy dos slides</label>
              <input style={S.input} type="password" value={ck} onChange={e => setCk(e.target.value)} placeholder="sk-ant-..." />
              <p style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:5}}>Modelo: claude-haiku-4-5 · custo por carrossel: ~R$0,05</p>
            </div>
            <div style={{marginBottom:24}}>
              <label style={S.label}>Chave API Gemini (Google AI Studio) — imagens</label>
              <input style={S.input} type="password" value={gk} onChange={e => setGk(e.target.value)} placeholder="AIza..." />
              <p style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginTop:5}}>Modelo: gemini-2.0-flash · Obtenha em aistudio.google.com · US$300 grátis em contas novas</p>
            </div>
            <div style={{display:'flex',gap:10}}>
              <button style={S.btnP} onClick={save}>Salvar</button>
              <button style={{...S.btnS,width:'auto'}} onClick={onClose}>Cancelar</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── CLIENT MODAL ── */

      });
      const [tag, setTag] = useState('');
      const set = (k, v) => setF(p => ({ ...p, [k]: v }));

      const addTag = () => {
        const t = tag.trim().toLowerCase();
        if (t && !f.palavrasProibidas.includes(t)) { set('palavrasProibidas', [...f.palavrasProibidas, t]); setTag(''); }
      };

      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={{...S.modal,maxWidth:620}} onClick={e => e.stopPropagation()}>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
              {[['nome','Nome da Médica','Dra. Nome Sobrenome'],['especialidade','Especialidade','Ginecologia e Obstetrícia'],['instagram','@ Instagram','@draexemplo'],['nicho','Nicho','Menopausa e saúde hormonal 40+']].map(([k,l,p]) => (
                <div key={k}>
                  <label style={S.label}>{l}</label>
                  <input style={S.input} value={f[k]} onChange={e => set(k, e.target.value)} placeholder={p} />
                </div>
              ))}
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Tom de Voz</label>
              <input style={S.input} value={f.tomVoz} onChange={e => set('tomVoz', e.target.value)} />
            </div>
            <div style={{marginBottom:14}}>
              <label style={S.label}>Foto da Médica (para Gemini integrar o rosto)</label>
              {f.fotoRostoUrl
                ? <div style={{display:'flex',gap:12,alignItems:'center'}}>

                    <span style={{fontSize:11,color:'rgba(255,255,255,0.35)'}}>Foto carregada</span>
                  </div>
                : <input type="file" accept="image/*" style={{...S.input,padding:'7px 14px',cursor:'pointer'}} onChange={e=>{

                    const r=new FileReader(); r.onload=ev=>set('fotoRostoUrl',ev.target.result); r.readAsDataURL(file);
                  }} />

              <p style={{fontSize:11,color:'rgba(255,255,255,0.3)',marginTop:5}}>Ative "Usar foto da médica" ao gerar para inserir o rosto nas imagens.</p>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:14}}>
              {[['corPrimaria','Cor Primária'],['corSecundaria','Cor Secundária']].map(([k,l]) => (
                <div key={k}>
                  <label style={S.label}>{l}</label>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input type="color" value={f[k]} onChange={e => set(k, e.target.value)} style={{width:38,height:34,border:'none',background:'none'}} />
                    <input style={{...S.input,flex:1}} value={f[k]} onChange={e => set(k, e.target.value)} />

              <div>
                <label style={S.label}>Fonte</label>

            <div style={{marginBottom:18}}>
              <label style={S.label}>Palavras Proibidas (CFM)</label>
              <div style={{display:'flex',gap:8,marginBottom:8}}>

              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {f.palavrasProibidas.map(w => (
                  <span key={w} style={{background:'rgba(244,117,48,0.12)',border:'1px solid rgba(244,117,48,0.25)',borderRadius:20,padding:'3px 10px',fontSize:12,display:'flex',alignItems:'center',gap:6}}>
                    {w}
                    <button onClick={() => set('palavrasProibidas', f.palavrasProibidas.filter(x=>x!==w))} style={{background:'none',border:'none',color:ORANGE,cursor:'pointer',fontSize:15,lineHeight:1,padding:0}}>×</button>
                  </span>

            <div style={{display:'flex',gap:10}}>

    /* ── SLIDE EDIT MODAL ── */
    function EditModal({ slide, onSave, onClose }) {

      const set = (k, v) => setS(p => ({ ...p, [k]: v }));

      // função normal, não componente — evita perda de foco ao remontar
      const field = (label, k, multi) => (
        <div key={k} style={{marginBottom:14}}>
          <label style={S.label}>{label}</label>
          {multi
            ? <textarea style={{...S.input,resize:'vertical',minHeight:76}} value={s[k]||''} onChange={e=>set(k,e.target.value)} />
            : <input style={S.input} value={s[k]||''} onChange={e=>set(k,e.target.value)} />
          }
        </div>
      );

      return (
        <div style={S.overlay} onClick={onClose}>
          <div style={{...S.modal,maxWidth:480}} onClick={e=>e.stopPropagation()}>

              <h2 style={{fontSize:17,fontWeight:700}}>Editar Slide {s.numero}</h2>
              <button onClick={onClose} style={S.btnG}>✕</button>

              <div style={{marginBottom:14}}>
                <label style={S.label}>Posição do Texto</label>

                  {[['bottom','Abaixo (padrão)'],['middle','Centro']].map(([v,l])=>(
                    <button key={v} onClick={()=>set('textPosition',v)} style={{...S.btnS,flex:1,fontSize:12,padding:'9px',background:(s.textPosition||'bottom')===v?'rgba(244,117,48,0.15)':'rgba(255,255,255,0.05)',borderColor:(s.textPosition||'bottom')===v?ORANGE:'rgba(255,255,255,0.1)'}}>
                      {l}
                    </button>
                  ))}
                </div>

              {field('Headline', 'headline', true)}
              {field('Palavra Destaque', 'destaque', false)}
              {field('Subtítulo', 'subtitulo', true)}

            {s.tipo==='conteudo' && <>
              <div style={{marginBottom:14}}>
                <label style={S.label}>Layout do Slide</label>

                  {LAYOUTS.map(l=>(
                    <button key={l.id} onClick={()=>set('layout',l.id)} style={{...S.btnS,flex:1,fontSize:11,padding:'7px 4px',background:(s.layout||'inline')===l.id?'rgba(244,117,48,0.15)':'rgba(255,255,255,0.05)',borderColor:(s.layout||'inline')===l.id?ORANGE:'rgba(255,255,255,0.1)'}}>

              <button style={S.btnP} onClick={()=>onSave(s)}>Salvar</button>

    /* ── SLIDE CARD PREVIEW ── */
    function SlideCard({ slide, idx, client, onEdit, onDownload, onRegen, regenning, onUploadImage, onClearImage }) {
      const PW = Math.round(SW * SCALE);
      const PH = Math.round(SH * SCALE);
      const isCta = slide.tipo === 'cta';
      const cp = client?.corPrimaria || ORANGE;
      const cs = client?.corSecundaria || DARK;
      const slideBg = slide.bgColor || (isCta ? cp : cs);

      const fileRef = useRef(null);
      const handleUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => onUploadImage(idx, ev.target.result.split(',')[1]);
        reader.readAsDataURL(file);
      };

      const imgBg = slide.imageData ? `url(data:image/png;base64,${slide.imageData})` : null;

      const wrapperStyle = {
        width: PW, height: PH, borderRadius: 10, overflow: 'hidden',
        cursor: 'pointer', position: 'relative', flexShrink: 0,
        border: '1px solid rgba(255,255,255,0.1)',
      };

      const innerStyle = {
        width: SW, height: SH, position: 'absolute', top: 0, left: 0,
        transform: `scale(${SCALE})`, transformOrigin: 'top left',
        fontFamily: 'Sora,sans-serif', overflow: 'hidden', position: 'absolute',
      };

      const PAD = 90;

      return (
        <div style={{display:'flex',flexDirection:'column',gap:6}}>
          <div style={wrapperStyle} onClick={()=>onEdit(slide,idx)}>
            <div style={innerStyle}>

              {/* ── CAPA ── */}
              {slide.tipo === 'capa' && (() => {
                const pos = slide.textPosition || 'bottom';
                const textStyle = pos === 'middle'
                  ? {position:'absolute',top:'50%',left:0,right:0,transform:'translateY(-50%)',padding:`0 ${PAD}px`,display:'flex',flexDirection:'column',gap:24}
                  : {position:'absolute',bottom:0,left:0,right:0,padding:`0 ${PAD}px 100px`,display:'flex',flexDirection:'column',gap:24};
                const gradStyle = pos === 'middle'
                  ? 'radial-gradient(ellipse at center, rgba(6,14,24,0.82) 0%, rgba(6,14,24,0.35) 70%, rgba(6,14,24,0.1) 100%)'
                  : 'linear-gradient(180deg,rgba(6,14,24,0.05) 0%,rgba(6,14,24,0.4) 35%,rgba(6,14,24,0.92) 70%,rgba(6,14,24,0.98) 100%)';
                return (
                <div style={{width:SW,height:SH,position:'relative',background:cs}}>
                  {imgBg && <div style={{position:'absolute',inset:0,backgroundImage:imgBg,backgroundSize:'cover',backgroundPosition:'center top'}} />}
                  <div style={{position:'absolute',inset:0,background:gradStyle}} />
                  <div style={textStyle}>
                    {slide.destaque && <div style={{color:cp,fontSize:46,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.04em',lineHeight:1}}>{slide.destaque}</div>}
                    <div style={{color:slide.textColor||'#fff',fontSize:78,fontWeight:700,lineHeight:1.18}}>{slide.headline}</div>
                    {slide.subtitulo && <div style={{color:slide.textColor?`${slide.textColor}99`:'rgba(255,255,255,0.6)',fontSize:36,lineHeight:1.5}}>{slide.subtitulo}</div>}
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:16}}>
                      <div style={{display:'flex',alignItems:'center',gap:14}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:cp}} />
                        <span style={{color:cp,fontSize:26,fontWeight:700}}>{client?.instagram ? `@${client.instagram.replace(/^@/,'')}` : client?.nome || ''}</span>
                      </div>
                      <div style={{color:'rgba(255,255,255,0.35)',fontSize:28}}>deslize →</div>
                    </div>
                  </div>
                  <div style={{position:'absolute',top:60,right:PAD,color:'rgba(255,255,255,0.25)',fontSize:30}}>1 / {idx+1}</div>
                </div>
                );
              })()}

              {/* ── CONTEÚDO ── */}
              {slide.tipo === 'conteudo' && (() => {
                const layout = slide.layout || 'inline';
                const numLabel = <div style={{display:'flex',alignItems:'center',gap:24,flexShrink:0}}><span style={{color:cp,fontSize:36,fontWeight:800}}>0{slide.numero}</span><div style={{flex:1,height:2,background:`${cp}30`}} /></div>;
                const counter = <div style={{color:'rgba(255,255,255,0.18)',fontSize:30,textAlign:'right',flexShrink:0}}>{slide.numero} →</div>;
                const imgEl = slide.imageData ? <div style={{borderRadius:20,overflow:'hidden',flexShrink:0}}><img src={`data:image/png;base64,${slide.imageData}`} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top'}} alt="" /></div> : null;

                if (layout === 'lateral') {
                  return (
                    <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                      <div style={{height:8,background:cp,flexShrink:0}} />
                      <div style={{flex:1,display:'flex',minHeight:0}}>
                        <div style={{flex:1,padding:`60px ${PAD}px 60px`,display:'flex',flexDirection:'column',gap:30,justifyContent:'center'}}>
                          {numLabel}
                          {slide.titulo && <div style={{color:slide.textColor||'#fff',fontSize:60,fontWeight:700,lineHeight:1.18}}>{slide.titulo}</div>}
                          {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.78)',fontSize:40,lineHeight:1.65}}>{slide.texto}</div>}
                          {counter}
                        </div>
                        {slide.imageData && <div style={{width:'45%',flexShrink:0,overflow:'hidden'}}><img src={`data:image/png;base64,${slide.imageData}`} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center'}} alt="" /></div>}
                      </div>
                    </div>
                  );
                }
                if (layout === 'texto') {
                  return (
                    <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                      <div style={{height:8,background:cp,flexShrink:0}} />
                      <div style={{flex:1,padding:`70px ${PAD}px 70px`,display:'flex',flexDirection:'column',gap:36,justifyContent:'center'}}>
                        {numLabel}
                        {slide.titulo && <div style={{color:slide.textColor||'#fff',fontSize:72,fontWeight:700,lineHeight:1.18}}>{slide.titulo}</div>}
                        {slide.texto && <div style={{color:slide.textColor||'#fff',fontSize:58,fontWeight:500,lineHeight:1.5}}>{slide.texto}</div>}
                        {counter}
                      </div>
                    </div>
                  );
                }
                // inline (default)
                return (
                  <div style={{width:SW,height:SH,background:slide.bgColor||cs,display:'flex',flexDirection:'column'}}>
                    <div style={{height:8,background:cp,flexShrink:0}} />
                    <div style={{flex:1,padding:`70px ${PAD}px 70px`,display:'flex',flexDirection:'column',gap:36}}>
                      {numLabel}
                      {slide.titulo && <div style={{color:slide.textColor||'#fff',fontSize:72,fontWeight:700,lineHeight:1.18}}>{slide.titulo}</div>}
                      {slide.imageData && (
                        <div style={{width:'100%',height:380,borderRadius:20,overflow:'hidden',flexShrink:0}}>
                          <img src={`data:image/png;base64,${slide.imageData}`} style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top'}} alt="" />
                        </div>
                      )}
                      {slide.texto && <div style={{color:slide.textColor?`${slide.textColor}cc`:'rgba(255,255,255,0.72)',fontSize:44,lineHeight:1.65,flex:1}}>{slide.texto}</div>}
                      {counter}
                    </div>
                  </div>
                );
              })()}

              {/* ── CTA ── */}
              {slide.tipo === 'cta' && (
                <div style={{width:SW,height:SH,position:'relative',background:cp}}>
                  <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,rgba(0,0,0,0.08) 0%,rgba(0,0,0,0) 60%)'}} />
                  <div style={{position:'absolute',inset:0,padding:`${PAD}px`,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',textAlign:'center',gap:48}}>
                    {slide.texto && <div style={{color:'#fff',fontSize:56,fontWeight:700,lineHeight:1.3}}>{slide.texto}</div>}
                    <div style={{background:cs,borderRadius:20,padding:'32px 80px'}}>
                      <div style={{color:'#fff',fontSize:96,fontWeight:800,textTransform:'uppercase',letterSpacing:'0.04em',lineHeight:1}}>{slide.palavra_gatilho||'COMENTE'}</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:12}}>
                      <div style={{color:'rgba(255,255,255,0.9)',fontSize:36,fontWeight:500}}>Comente esta palavra abaixo</div>
                      {slide.beneficio && <div style={{color:'rgba(255,255,255,0.7)',fontSize:32}}>e receba: {slide.beneficio}</div>}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </div>
          {/* Gemini — linha dedicada e destacada */}
          <button onClick={()=>onRegen(slide,idx)} disabled={regenning} style={{width:PW,background:regenning?'rgba(255,255,255,0.04)':'rgba(244,117,48,0.1)',border:`1px solid ${regenning?'rgba(255,255,255,0.08)':'rgba(244,117,48,0.35)'}`,borderRadius:7,padding:'8px',fontFamily:'Sora,sans-serif',fontSize:11,fontWeight:600,color:regenning?'rgba(255,255,255,0.2)':cp,cursor:regenning?'default':'pointer',textAlign:'center'}}>
            {regenning ? '⟳ Gerando imagem...' : '⟳ Gerar Imagem com Gemini'}
          </button>
          {/* ações secundárias */}
          <div style={{display:'flex',gap:3,width:PW}}>
            <button onClick={()=>onEdit(slide,idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:10,color:'rgba(255,255,255,0.5)'}}>✏ Editar</button>
            <button onClick={()=>onDownload(slide,idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:10,color:'rgba(255,255,255,0.5)'}}>↓ PNG</button>
            <button onClick={()=>fileRef.current?.click()} style={{...S.btnG,flex:1,textAlign:'center',fontSize:10,color:'rgba(255,255,255,0.5)'}}>📁 Upload</button>
            {slide.imageData && <button onClick={()=>onClearImage(idx)} style={{...S.btnG,flex:1,textAlign:'center',fontSize:10,color:'rgba(220,50,50,0.7)'}}>✕ Img</button>}
          </div>
          {/* hidden file input */}
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleUpload} />
          {/* cores de fundo e texto — disponível para capa e conteudo */}
          {(slide.tipo === 'conteudo' || slide.tipo === 'capa') && (
            <div style={{display:'flex',alignItems:'center',gap:6,width:PW,background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:6,padding:'5px 8px'}}>
              <span style={{fontSize:10,color:'rgba(255,255,255,0.35)'}}>Fundo</span>
              <input type="color" value={slide.bgColor||cs} onChange={e=>onEdit({...slide,bgColor:e.target.value},idx,true)} style={{width:24,height:20,border:'1px solid rgba(255,255,255,0.15)',borderRadius:3,background:'none',cursor:'pointer',padding:1}} />
              {slide.bgColor && <button onClick={()=>onEdit({...slide,bgColor:null},idx,true)} style={{...S.btnG,fontSize:9,padding:'1px 4px',color:'rgba(255,255,255,0.3)'}}>↺</button>}
              <div style={{width:1,height:14,background:'rgba(255,255,255,0.1)',margin:'0 2px'}} />
              <span style={{fontSize:10,color:'rgba(255,255,255,0.35)'}}>Texto</span>
              <input type="color" value={slide.textColor||'#ffffff'} onChange={e=>onEdit({...slide,textColor:e.target.value},idx,true)} style={{width:24,height:20,border:'1px solid rgba(255,255,255,0.15)',borderRadius:3,background:'none',cursor:'pointer',padding:1}} />
              {slide.textColor && <button onClick={()=>onEdit({...slide,textColor:null},idx,true)} style={{...S.btnG,fontSize:9,padding:'1px 4px',color:'rgba(255,255,255,0.3)'}}>↺</button>}
            </div>
          )}
        </div>
      );
    }

    /* ── TOGGLE ── */
    function Toggle({ label, sub, checked, onChange, disabled }) {
      return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,opacity:disabled?0.4:1}}>
          <div>
            <div style={{fontSize:13,fontWeight:500}}>{label}</div>
            {sub && <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginTop:2}}>{sub}</div>}
          </div>
          <div onClick={()=>!disabled&&onChange(!checked)} style={{width:44,height:24,borderRadius:12,background:checked?ORANGE:'rgba(255,255,255,0.14)',position:'relative',cursor:disabled?'default':'pointer',transition:'background 0.2s',flexShrink:0}}>
            <div style={{width:18,height:18,borderRadius:'50%',background:'#fff',position:'absolute',top:3,left:checked?23:3,transition:'left 0.2s'}} />
          </div>
        </div>
      );
    }

      const [hashtags, setHashtags]             = useState([]);

      const [generating, setGenerating]         = useState(false);
      const [genImgIdx, setGenImgIdx]           = useState(-1);
      const [progress, setProgress]             = useState('');
      const [error, setError]                   = useState('');
      const [modal, setModal]                   = useState(null);
      const [editClient, setEditClient]         = useState(null);
      const [editSlide, setEditSlide]           = useState(null);
      const [downloading, setDownloading]       = useState(false);
      const [viralStructures, setViralStructures] = useState(() => LS.get('viralStructures', []));
      const [savedCarousels, setSavedCarousels] = useState(() => LS.get('savedCarousels', []));
      const [activeCarouselId, setActiveCarouselId] = useState(null);
      const [savedOpen, setSavedOpen]           = useState(false);
      const [pautaOpen, setPautaOpen]           = useState(false);
      const [pautaSuggestions, setPautaSuggestions] = useState([]);
      const [pautaForm, setPautaForm]           = useState({ temas:'' });
      const [generatingPauta, setGeneratingPauta] = useState(false);

      const client = clients.find(c => c.id === selId);

      const saveClients = (arr) => { setClients(arr); LS.set('clients', arr); };
      const selectClient = (id) => { setSelId(id); LS.set('selId', id); };

      const handleSaveClient = (data) => {
        const idx = clients.findIndex(c => c.id === data.id);
        const arr = idx >= 0 ? clients.map(c => c.id===data.id ? data : c) : [...clients, data];
        saveClients(arr);
        selectClient(data.id);
        setModal(null); setEditClient(null);
      };

      const handleDelClient = (id) => {
        if (!confirm('Remover este perfil?')) return;
        const arr = clients.filter(c => c.id !== id);
        saveClients(arr);
        if (selId === id) { const nid = arr[0]?.id||null; selectClient(nid); }
      };

      const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const handleGenerate = async () => {
        if (!client) { setError('Selecione ou crie uma médica primeiro.'); return; }
        if (!form.tema.trim()) { setError('Digite o tema do carrossel.'); return; }
        const ck = LS.get('claudeKey','');
        const gk = LS.get('geminiKey','');
        if (!ck) { setError('Configure a chave API do Claude nas Configurações (⚙).'); return; }
        setError(''); setGenerating(true); setSlides([]); setLegenda(''); setHashtags([]); setPalavraGatilho(''); setActiveCarouselId(null);

        try {
          setProgress('Gerando copy com Claude...');
          const result = await generateCopy(form, client, ck);
          setSlides(result.slides || []);
          setLegenda(result.legenda || '');
          setHashtags(result.hashtags || []);
          setPalavraGatilho(result.palavra_gatilho_dm || '');
          setProgress('');

          // Fase 1 completa — imagens ficam para fase 2 (manual por slide ou botão "Gerar todas")

        } catch (e) { setError(e.message || 'Erro ao gerar conteúdo'); }
        finally { setGenerating(false); setProgress(''); }
      };

      const handleRegen = async (slide, idx) => {
        const gk = LS.get('geminiKey','');
        if (!gk) { setError('Configure a chave API Gemini nas Configurações.'); return; }
        if (!slide.prompt_imagem) { setError('Slide sem prompt de imagem. Edite o slide para adicionar um.'); return; }
        setGenImgIdx(idx); setError('');
        try {
          const fotoB64 = form.usarFotoMedica && client?.fotoRostoUrl
            ? client.fotoRostoUrl.replace(/^data:image\/[^;]+;base64,/, '') : null;
          const imgData = await generateImage(slide.prompt_imagem, gk, fotoB64);
          setSlides(prev => prev.map((s,i) => i===idx ? {...s, imageData: imgData} : s));
        } catch (e) { setError(e.message); }
        finally { setGenImgIdx(-1); }
      };

      const handleGenerateAllImages = async () => {
        const gk = LS.get('geminiKey','');
        if (!gk) { setError('Configure a chave API Gemini nas Configurações (⚙).'); return; }
        setError('');
        const fotoB64 = form.usarFotoMedica && client?.fotoRostoUrl
          ? client.fotoRostoUrl.replace(/^data:image\/[^;]+;base64,/, '') : null;
        const updated = [...slides];
        for (let i = 0; i < updated.length; i++) {
          if (updated[i].prompt_imagem) {
            try {
              setProgress(`Gerando imagem ${i+1} de ${updated.length}...`);
              setGenImgIdx(i);
              const imgData = await generateImage(updated[i].prompt_imagem, gk, fotoB64);
              updated[i] = { ...updated[i], imageData: imgData };
              setSlides([...updated]);
            } catch (e) { console.warn(`Slide ${i+1}:`, e.message); }
          }
        }
        setGenImgIdx(-1); setProgress('');
      };

      const handleDownloadAll = async () => {
        if (!client || !slides.length) return;
        setDownloading(true); setError('');
        try { await downloadAll(slides, client); }
        catch (e) { setError(e.message); }
        finally { setDownloading(false); }
      };

      const handleDownloadOne = async (slide, idx) => {
        if (!client) return;
        try { await downloadOne(slide, client, idx); }
        catch (e) { setError(e.message); }
      };

      const handleSaveViral = () => {
        const nome = prompt('Nome para esta estrutura viral:');
        if (!nome?.trim()) return;
        const estrutura = {
          id: Date.now().toString(),
          nome: nome.trim(),
          formato: form.formato,
          numSlides: slides.length,
          criado: new Date().toLocaleDateString('pt-BR'),
          slides: slides.map(s => ({ tipo:s.tipo, layout:s.layout||'inline', temTitulo:!!s.titulo, temImagem:!!s.imageData }))
        };
        const arr = [estrutura, ...viralStructures].slice(0, 10);
        setViralStructures(arr);
        LS.set('viralStructures', arr);
      };

      const handleApplyViral = (estrutura) => {
        const fmt = FORMATS.find(f=>f.id===estrutura.formato);
        setF('formato', estrutura.formato);
        setF('numSlides', estrutura.numSlides);
        const hint = `Formato salvo: ${fmt?.label||estrutura.formato} (${estrutura.numSlides} slides). Insira o tema e clique em Gerar Copy.`;
        setError(''); setProgress(hint);
        setTimeout(() => setProgress(''), 4000);
      };

      const handleDeleteViral = (id) => {
        const arr = viralStructures.filter(v=>v.id!==id);
        setViralStructures(arr);
        LS.set('viralStructures', arr);
      };

      const handleSaveCarousel = () => {
        if (!slides.length) return;
        const data = {
          clientId: selId,
          clientNome: client?.nome || '',
          savedAt: new Date().toLocaleDateString('pt-BR'),
          form: { ...form },
          slides,
          legenda,
          hashtags,
          palavraGatilho,
        };
        try {
          if (activeCarouselId) {
            // atualiza o carrossel existente no lugar
            const arr = savedCarousels.map(c => c.id === activeCarouselId ? { ...c, ...data } : c);
            LS.set('savedCarousels', arr);
            setSavedCarousels(arr);
          } else {
            // novo carrossel — pede nome
            const nome = prompt('Nome para este carrossel:', form.tema || 'Carrossel sem nome');
            if (nome === null) return;
            const entry = { id: Date.now().toString(), nome: nome.trim() || form.tema || 'Carrossel', ...data };
            const arr = [entry, ...savedCarousels].slice(0, 5);
            LS.set('savedCarousels', arr);
            setSavedCarousels(arr);
            setActiveCarouselId(entry.id);
          }
          setSavedOpen(true);
        } catch(e) {
          setError('Sem espaço para salvar. Delete um carrossel salvo e tente novamente.');
        }
      };

      const handleLoadCarousel = (entry) => {
        if (!confirm(`Carregar "${entry.nome}"? O carrossel atual será substituído.`)) return;
        if (entry.clientId) selectClient(entry.clientId);
        setForm(entry.form);
        setSlides(entry.slides);
        setLegenda(entry.legenda);
        setHashtags(entry.hashtags);
        setPalavraGatilho(entry.palavraGatilho);
        setActiveCarouselId(entry.id);
        setSavedOpen(false);
      };

      const handleDeleteCarousel = (id) => {
        const arr = savedCarousels.filter(c=>c.id!==id);
        setSavedCarousels(arr);
        LS.set('savedCarousels', arr);
      };

      const handleGeneratePauta = async () => {
        const ck = LS.get('claudeKey','');
        if (!ck) { setError('Configure a chave Claude nas Configurações.'); return; }
        if (!client) { setError('Selecione uma médica primeiro.'); return; }
        if (!pautaForm.temas.trim()) { setError('Informe os temas do mês.'); return; }
        setGeneratingPauta(true); setPautaSuggestions([]);
        const systemPauta = `Você é estrategista de conteúdo para médicas de saúde da mulher no Brasil. Crie pautas de Instagram objetivas. Retorne APENAS JSON válido.`;
        const userPauta = `Crie uma pauta de 12 posts de Instagram para ${client.nome} (${client.especialidade}) para o próximo mês.
Temas principais do mês: ${pautaForm.temas}

Retorne exatamente:
{"posts":[{"semana":1,"tema":"tema curto","formato":"alerta|analogia|noticia|serie|diagnostico","gancho":"uma frase de gancho","palavraGatilho":"PALAVRA"},...12 posts]}`;
        try {
          const res = await fetch('/api/claude', { method:'POST', headers:{'Content-Type':'application/json','x-claude-key':ck},
            body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:2048, system:systemPauta, messages:[{role:'user',content:userPauta}] }) });
          const data = await res.json();
          const txt = data.content[0].text.trim();
          const match = txt.match(/\{[\s\S]*\}/);
          if (match) { const j = JSON.parse(match[0]); setPautaSuggestions(j.posts||[]); }
        } catch(e) { setError(e.message); }
        finally { setGeneratingPauta(false); }
      };

      return (
        <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>

          {/* TOP BAR */}
          <div style={{background:'#0D1928',borderBottom:'1px solid rgba(255,255,255,0.07)',padding:'0 20px',height:58,display:'flex',alignItems:'center',gap:14,flexShrink:0}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:30,height:30,background:ORANGE,borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:13}}>A</div>
              <span style={{fontWeight:700,fontSize:15}}>Gerador de Carrossel</span>
              <span style={{color:'rgba(255,255,255,0.25)',fontSize:11,fontWeight:400}}>AceleraGO · uso interno</span>
            </div>
            <div style={{flex:1}} />
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {clients.length > 0 && (
                <select value={selId||''} onChange={e=>selectClient(e.target.value)} style={{...S.input,width:'auto',minWidth:190,height:34,padding:'0 10px',fontSize:13}}>
                  <option value="">— Selecionar médica —</option>
                  {clients.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
                </select>
              )}
              <button onClick={()=>{setEditClient(null);setModal('client');}} style={{...S.btnS,height:34,padding:'0 12px',fontSize:12,whiteSpace:'nowrap'}}>+ Nova Médica</button>
              {client && <button onClick={()=>{setEditClient(client);setModal('client');}} style={{...S.btnS,height:34,padding:'0 10px',fontSize:13}}>✏</button>}
            </div>
            <button onClick={()=>setModal('settings')} style={{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:7,width:34,height:34,color:'#fff',cursor:'pointer',fontSize:15}}>⚙</button>
          </div>

          {/* LAYOUT */}
          <div style={{display:'flex',flex:1,minHeight:0}}>

            {/* LEFT PANEL */}
            <div style={{width:290,background:'#080f1c',borderRight:'1px solid rgba(255,255,255,0.07)',overflowY:'auto',padding:20,display:'flex',flexDirection:'column',gap:18,flexShrink:0}}>

              <div>
                <label style={S.label}>Formato</label>
                <div style={{display:'flex',flexDirection:'column',gap:5}}>
                  {FORMATS.map(f => (
                    <button key={f.id} onClick={()=>setF('formato',f.id)} style={{background:form.formato===f.id?'rgba(244,117,48,0.12)':'rgba(255,255,255,0.03)',border:`1px solid ${form.formato===f.id?ORANGE:'rgba(255,255,255,0.07)'}`,borderRadius:7,padding:'9px 12px',color:form.formato===f.id?'#fff':'rgba(255,255,255,0.55)',cursor:'pointer',textAlign:'left',fontFamily:'Sora,sans-serif'}}>
                      <div style={{fontSize:12,fontWeight:600}}>{f.label}</div>
                      <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',marginTop:2}}>{f.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              <div>
                <label style={S.label}>Tema do Carrossel</label>
                <textarea style={{...S.input,resize:'vertical',minHeight:78,lineHeight:1.55}} value={form.tema} onChange={e=>setF('tema',e.target.value)} placeholder={"Ex: menopausa e ganho de peso\nEx: mitos sobre a pílula anticoncepcional"} />
              </div>

              <div>
                <label style={S.label}>Número de Slides</label>
                <div style={{display:'flex',gap:6}}>
                  {[5,8,10].map(n => (
                    <button key={n} onClick={()=>setF('numSlides',n)} style={{flex:1,background:form.numSlides===n?ORANGE:'rgba(255,255,255,0.06)',border:'none',borderRadius:7,padding:'9px',color:'#fff',cursor:'pointer',fontFamily:'Sora,sans-serif',fontWeight:700,fontSize:14}}>{n}</button>
                  ))}
                </div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <Toggle label="Gerar imagens com Gemini" sub="Requer chave API Gemini" checked={form.gerarImagens} onChange={v=>setF('gerarImagens',v)} />
                <Toggle label="Usar foto da médica" sub="Insere o rosto nos prompts (Beta)" checked={form.usarFotoMedica} onChange={v=>setF('usarFotoMedica',v)} disabled={!client?.fotoRostoUrl} />
              </div>

              {error && <div style={{background:'rgba(220,38,38,0.12)',border:'1px solid rgba(220,38,38,0.25)',borderRadius:7,padding:'10px 14px',fontSize:12,color:'#fca5a5',lineHeight:1.5}}>{error}</div>}
              {(generating||genImgIdx>=0) && progress && <div style={{background:'rgba(244,117,48,0.08)',border:'1px solid rgba(244,117,48,0.2)',borderRadius:7,padding:'10px 14px',fontSize:12,color:ORANGE}}>{progress}</div>}

              <button onClick={handleGenerate} disabled={generating||!client} style={{...S.btnP,opacity:generating||!client?0.45:1,fontSize:15,padding:'14px'}}>
                {generating ? 'Gerando copy...' : '✦ Fase 1: Gerar Copy'}
              </button>

              {slides.length > 0 && (
                <>
                  <button onClick={handleGenerateAllImages} disabled={genImgIdx>=0} style={{...S.btnS,width:'100%',padding:'11px',fontSize:13,opacity:genImgIdx>=0?0.5:1,borderColor:'rgba(244,117,48,0.4)',color:ORANGE}}>
                    {genImgIdx>=0 ? progress||'Gerando imagens...' : `⟳ Fase 2: Gerar Todas as Imagens`}
                  </button>
                  <button onClick={handleSaveCarousel} style={{...S.btnS,width:'100%',padding:'11px',fontSize:13,borderColor:'rgba(100,200,100,0.4)',color:'rgba(100,220,100,0.9)'}}>
                    {activeCarouselId ? '💾 Salvar alterações' : '💾 Salvar Carrossel (para editar depois)'}
                  </button>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={handleDownloadAll} disabled={downloading} style={{...S.btnS,flex:1,padding:'10px',fontSize:12,opacity:downloading?0.5:1}}>
                      {downloading ? 'Preparando...' : `↓ Baixar ZIP`}
                    </button>
                    <button onClick={handleSaveViral} style={{...S.btnS,padding:'10px 12px',fontSize:12,borderColor:'rgba(255,215,0,0.3)',color:'rgba(255,215,0,0.8)'}} title="Salvar apenas a estrutura (formato, nº slides)">
                      ⚡ Estrutura
                    </button>
                  </div>
                </>
              )}

              {/* Carrosseis Salvos */}
              {savedCarousels.length > 0 && (
                <div>
                  <button onClick={()=>setSavedOpen(p=>!p)} style={{...S.btnS,width:'100%',padding:'10px',fontSize:12,borderColor:'rgba(100,220,100,0.25)',color:'rgba(100,220,100,0.8)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <span>💾 Carrosseis Salvos ({savedCarousels.length}/5)</span>
                    <span>{savedOpen?'▲':'▼'}</span>
                  </button>
                  {savedOpen && (
                    <div style={{display:'flex',flexDirection:'column',gap:4,marginTop:4}}>
                      {savedCarousels.map(c => (
                        <div key={c.id} style={{background:'rgba(100,220,100,0.05)',border:'1px solid rgba(100,220,100,0.15)',borderRadius:7,padding:'8px 10px'}}>
                          <div style={{display:'flex',alignItems:'flex-start',gap:6}}>
                            <div style={{flex:1,cursor:'pointer'}} onClick={()=>handleLoadCarousel(c)}>
                              <div style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.85)',lineHeight:1.3}}>{c.nome}</div>
                              <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',marginTop:3}}>{c.clientNome} · {c.slides.length} slides · {c.savedAt}</div>
                            </div>
                            <button onClick={()=>handleDeleteCarousel(c.id)} style={{...S.btnG,fontSize:14,padding:'0 4px',color:'rgba(255,255,255,0.2)',flexShrink:0}}>×</button>
                          </div>
                        </div>
                      ))}
                      <p style={{fontSize:10,color:'rgba(255,255,255,0.2)',textAlign:'center',marginTop:2}}>Máx. 5 salvos. Inclui imagens.</p>
                    </div>
                  )}
                </div>
              )}

              {/* Estruturas Virais */}
              {viralStructures.length > 0 && (
                <div>
                  <label style={{...S.label,color:'rgba(255,215,0,0.5)'}}>Estruturas Virais Salvas</label>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {viralStructures.map(v => (
                      <div key={v.id} style={{background:'rgba(255,215,0,0.05)',border:'1px solid rgba(255,215,0,0.12)',borderRadius:7,padding:'7px 10px',display:'flex',alignItems:'center',gap:6}}>
                        <div style={{flex:1,cursor:'pointer'}} onClick={()=>handleApplyViral(v)}>
                          <div style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.8)'}}>{v.nome}</div>
                          <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:2}}>{v.numSlides} slides · {v.criado}</div>
                        </div>
                        <button onClick={()=>handleDeleteViral(v.id)} style={{...S.btnG,fontSize:13,padding:'2px 5px',color:'rgba(255,255,255,0.2)'}}>×</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Pauta do Mês */}
              <div>
                <button onClick={()=>setPautaOpen(p=>!p)} style={{...S.btnS,width:'100%',padding:'10px',fontSize:12,borderColor:'rgba(100,180,255,0.25)',color:'rgba(100,180,255,0.8)'}}>
                  {pautaOpen ? '▲ Fechar Pauta' : '📅 Pauta do Mês'}
                </button>
                {pautaOpen && (
                  <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:8}}>
                    <textarea style={{...S.input,resize:'vertical',minHeight:60,fontSize:12}} value={pautaForm.temas} onChange={e=>setPautaForm({temas:e.target.value})} placeholder="Ex: menopausa, tireoide, emagrecimento hormonal" />
                    <button onClick={handleGeneratePauta} disabled={generatingPauta||!client} style={{...S.btnP,padding:'10px',fontSize:12,opacity:generatingPauta||!client?0.5:1}}>
                      {generatingPauta ? 'Gerando...' : '✦ Gerar 12 sugestões'}
                    </button>
                    {pautaSuggestions.length > 0 && (
                      <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:260,overflowY:'auto'}}>
                        {pautaSuggestions.map((p,i) => (
                          <div key={i} style={{background:'rgba(100,180,255,0.05)',border:'1px solid rgba(100,180,255,0.12)',borderRadius:7,padding:'7px 10px',cursor:'pointer'}}
                            onClick={()=>{ setF('tema', p.tema); setF('formato', p.formato||'alerta'); setPautaOpen(false); }}>
                            <div style={{fontSize:11,color:'rgba(255,255,255,0.55)',marginBottom:2}}>Sem {p.semana} · {FORMATS.find(f=>f.id===p.formato)?.label||p.formato}</div>
                            <div style={{fontSize:12,fontWeight:600,color:'rgba(255,255,255,0.85)'}}>{p.tema}</div>
                            <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:2,fontStyle:'italic'}}>{p.gancho}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {legenda && (
                <div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                    <label style={S.label}>Legenda gerada</label>
                    <button onClick={()=>navigator.clipboard.writeText(legenda+(hashtags.length?'\n\n'+hashtags.join(' '):''))} style={{...S.btnG,fontSize:10,color:ORANGE}}>Copiar</button>
                  </div>
                  <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:7,padding:12,fontSize:12,color:'rgba(255,255,255,0.65)',lineHeight:1.65,maxHeight:160,overflowY:'auto',whiteSpace:'pre-wrap'}}>{legenda}</div>
                  {hashtags.length > 0 && <div style={{marginTop:6,fontSize:11,color:ORANGE,lineHeight:1.9}}>{hashtags.join(' ')}</div>}
                  {palavraGatilho && (
                    <div style={{marginTop:8,background:'rgba(244,117,48,0.1)',borderRadius:6,padding:'7px 12px',fontSize:11}}>
                      Palavra-gatilho DM: <strong style={{color:ORANGE}}>{palavraGatilho}</strong>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* SLIDES AREA */}
            <div style={{flex:1,overflowY:'auto',padding:24}}>
              {slides.length === 0 ? (
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:14,color:'rgba(255,255,255,0.18)'}}>
                  <div style={{fontSize:52}}>◈</div>
                  <div style={{fontSize:15,textAlign:'center'}}>
                    {client ? `Pronto para gerar carrossel para ${client.nome}` : 'Selecione ou crie uma médica para começar'}
                  </div>
                  {!client && (
                    <button onClick={()=>setModal('client')} style={{...S.btnP,width:'auto',padding:'11px 22px',marginTop:8,fontSize:13}}>+ Criar primeira médica</button>
                  )}
                </div>
              ) : (
                <div style={{display:'flex',flexWrap:'wrap',gap:18,alignContent:'flex-start'}}>
                  {slides.map((slide,i) => (
                    <SlideCard key={i} slide={slide} idx={i}
                      client={client}
                      onEdit={(sl,ix,silent) => { if(silent){setSlides(prev=>prev.map((s,j)=>j===ix?sl:s));}else{setEditSlide({slide:sl,idx:ix});}}}
                      onDownload={handleDownloadOne}
                      onRegen={handleRegen}
                      regenning={genImgIdx===i}
                      onUploadImage={(ix,b64)=>setSlides(prev=>prev.map((s,j)=>j===ix?{...s,imageData:b64}:s))}
                      onClearImage={(ix)=>setSlides(prev=>prev.map((s,j)=>j===ix?{...s,imageData:null}:s))}
                    />
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* MODALS */}
          {modal==='settings' && <SettingsModal onClose={()=>setModal(null)} />}
          {modal==='client'   && <ClientModal client={editClient} onSave={handleSaveClient} onClose={()=>{setModal(null);setEditClient(null);}} />}
          {editSlide && <EditModal slide={editSlide.slide} onSave={s=>{setSlides(prev=>prev.map((sl,i)=>i===editSlide.idx?s:sl));setEditSlide(null);}} onClose={()=>setEditSlide(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
