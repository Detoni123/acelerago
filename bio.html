<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AceleraGO | Marketing para Saúde da Mulher</title>
  <meta name="description" content="Marketing exclusivo para clínicas de ginecologia, obstetrícia e reprodução humana. Mais pacientes qualificadas, agenda cheia e crescimento previsível." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://acelerago.com.br/bio" />
  <link rel="icon" type="image/png" href="https://acelerago.com.br/logo-favicon.png?v=4" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D1928;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    .stack {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 10px 10px;
    }

    .stack img {
      width: 100%;
      height: auto;
      display: block;
    }

    .stack a {
      display: block;
      cursor: pointer;
      transition: opacity .18s ease;
    }

    .stack a:hover  { opacity: .88; }
    .stack a:active { opacity: .72; }

    footer {
      padding: 40px 0 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .soc {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 28px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: rgba(255,255,255,.75);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: .02em;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color .2s, color .2s;
      -webkit-font-smoothing: antialiased;
    }

    .soc:hover  { border-color: rgba(255,255,255,.45); color: #fff; }
    .soc:active { border-color: rgba(255,255,255,.6);  color: #fff; }
    .soc svg    { flex-shrink: 0; display: block; opacity: .7; }

    .copy {
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: #2d3d4e;
      letter-spacing: .03em;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div class="stack">

    <!-- Hero + primeiro banner colados (gap 0) -->
    <div style="display:flex;flex-direction:column;gap:0">
      <img
        src="/bio/hero-acelerago-bio.webp"
        alt="AceleraGO — Marketing para Ginecologia, Obstetrícia e Reprodução Humana"
        loading="eager"
      />
      <a
        href="https://acelerago.com.br/diagnostico?utm_source=instagram&utm_medium=bio&utm_campaign=sessao-diagnostico"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Aplicar para sessão de diagnóstico"
      >
        <img
          src="/bio/sessao-estrategica-bio-acelerago.webp"
          alt="Aplicar para sessão de diagnóstico"
          loading="lazy"
        />
      </a>
    </div>

    <!-- WhatsApp -->
    <a
      href="https://wa.me/5511934619564?text=Ol%C3%A1%2C+vim+pelo+Instagram+e+quero+falar+com+o+time+da+AceleraGO+%28instagram_bio%29"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Falar com nosso time pelo WhatsApp"
    >
      <img
        src="/bio/contato-whatsapp-bio-acelerago.webp"
        alt="Fale com nosso time"
        loading="lazy"
      />
    </a>

    <!-- Conheça a AceleraGO -->
    <a
      href="https://acelerago.com.br"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Conhecer a AceleraGO"
    >
      <img
        src="/bio/acesse-site-acelerago-bio.webp"
        alt="Conheça a AceleraGO"
        loading="lazy"
      />
    </a>

    <footer>
      <a href="https://instagram.com/acelerago.oficial" class="soc" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>

        @acelerago.oficial
      </a>
      <p class="copy">© AceleraGO | acelerago.com.br</p>
    </footer>

  </div>
</body>
</html>
