<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronaldo Detoni</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="../logo-favicon.png?v=4" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D1928;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    .stack {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 0;
    }

    .stack img {
      width: 100%;
      height: auto;
      display: block;
    }

    .stack a {
      display: block;
      cursor: pointer;
      transition: opacity .18s ease;
    }

    .stack a:hover { opacity: .88; }
    .stack a:active { opacity: .75; }

    footer {
      padding: 24px 16px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .social-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .soc {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 50px;
      border: 1px solid #00B5A9;
      background: transparent;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: .82rem;
      font-weight: 400;
      letter-spacing: .01em;
      text-decoration: none;
      transition: background .2s ease, color .2s ease;
      cursor: pointer;
    }

    .soc:hover { background: rgba(0,181,169,.15); }
    .soc svg   { flex-shrink: 0; }

    .copy {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: .68rem;
      color: #334155;
      letter-spacing: .02em;
    }
  </style>
</head>
