<html lang="pt-BR">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0d1928;
      --green:   #25d366;
      --green-d: #128c3e;
      --white:   #fff;
      --ease:    .32s cubic-bezier(.4,0,.2,1);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; }
    a   { text-decoration: none; color: inherit; }

    /* ── ambient glows ─────────────────────────────────── */
    .g1, .g2 {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .g1 {
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(0,181,169,.08) 0%, transparent 60%);
    }
    .g2 {
      bottom: -180px; right: -80px;
      width: 500px; height: 500px;
      background: radial-gradient(ellipse, rgba(244,117,48,.06) 0%, transparent 60%);
    }

    /* ── page ──────────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100dvh;
      max-width: 440px; margin: 0 auto;
      padding: 52px 20px 40px;
      gap: 24px;
    }

    /* ── hero ──────────────────────────────────────────── */
    .hero {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      text-align: center; width: 100%;
    }

    .ring {
      width: 100px; height: 100px;
      border-radius: 50%; padding: 2.5px;
      background: linear-gradient(135deg, #f47530, #00b5a9, #f7965a, #33c8be);
      background-size: 300% 300%;
      animation: ra 5s linear infinite; flex-shrink: 0;
    }
    @keyframes ra {
      0%  { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100%{ background-position: 0% 50%; }
    }
    .ring-in {
      width: 100%; height: 100%;
      border-radius: 50%; overflow: hidden;
      background: #152640; border: 2px solid var(--navy);
    }
    .ring-in img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
    }

    h1 {
      font-size: clamp(1.7rem, 6.5vw, 2.1rem);
      font-weight: 800; letter-spacing: -.045em; line-height: 1;
    }
    .dash {
      width: 32px; height: 2px; border-radius: 99px;
      background: linear-gradient(90deg, #f47530, #00b5a9);
      margin: 0 auto;
    }
    .tagline {
      font-size: clamp(.82rem, 3.2vw, .9rem);
      color: rgba(255,255,255,.45); line-height: 1.65;
      max-width: 280px; letter-spacing: -.01em;
    }

    /* ── WhatsApp ──────────────────────────────────────── */
    .btn-wa {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      padding: 15px 20px; border-radius: 14px;
      background: linear-gradient(135deg, var(--green) 0%, var(--green-d) 100%);
      color: var(--white);
      font-weight: 700; font-size: .88rem;
      letter-spacing: .07em; text-transform: uppercase;
      box-shadow: 0 6px 28px rgba(37,211,102,.22),
                  inset 0 1px 0 rgba(255,255,255,.14);
      transition: transform var(--ease), box-shadow var(--ease);
      border: none; cursor: pointer;
    }
    .btn-wa:hover  { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(37,211,102,.35), inset 0 1px 0 rgba(255,255,255,.14); }
    .btn-wa:active { transform: translateY(0); }
    .btn-wa svg { flex-shrink: 0; }

    /* ── LOGO BUTTONS ──────────────────────────────────── */
    .ops { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .op {
      position: relative; display: block; width: 100%;
      height: 136px; border-radius: 18px; overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.06);
      transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease);
    }
    .op:hover { transform: translateY(-3px); }

    /* the logo fills the button as background */
    .op-bg {
      position: absolute; inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
    }
    .op:hover .op-bg { transform: scale(1.05); }

    /* dark vignette so corner text stays readable */
    .op-vignette {
      position: absolute; inset: 0;
      background: linear-gradient(
        135deg,
        rgba(13,25,40,.18) 0%,
        transparent 40%,
        transparent 55%,
        rgba(13,25,40,.72) 100%
      );
      transition: opacity var(--ease);
    }
    .op:hover .op-vignette { opacity: .85; }

    /* corner label */
    .op-label {
      position: absolute; bottom: 14px; right: 16px;
      display: flex; align-items: center; gap: 5px;
      font-size: .65rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: rgba(255,255,255,.75);
      transition: color var(--ease), transform var(--ease);
      text-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .op:hover .op-label { color: var(--white); transform: translateX(-2px); }
    .op-label svg { flex-shrink: 0; opacity: .7; transition: opacity var(--ease), transform var(--ease); }
    .op:hover .op-label svg { opacity: 1; transform: translate(2px,-2px); }

    /* per-card accent glow */
    .op.teal:hover  { border-color: rgba(0,181,169,.4);  box-shadow: 0 14px 40px rgba(0,181,169,.15); }
    .op.orange:hover { border-color: rgba(244,117,48,.4); box-shadow: 0 14px 40px rgba(244,117,48,.12); }

    /* AceleraGO — transparent PNG on dark teal bg */
    .op.teal .op-bg {
      background-color: #0b2030;
      background-image: url('../acelerafundotransp.png');
    }

    /* Detoni — JPG fills the full card */
    .op.orange .op-bg {
      background-image: url('../logo-detoni.jpg');
    }

    /* ── Social ────────────────────────────────────────── */
    .social {
      display: flex; gap: 8px;
      justify-content: center; flex-wrap: wrap;
    }
    .soc {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 14px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      font-size: .78rem; font-weight: 500;
      color: rgba(255,255,255,.45); letter-spacing: -.01em;
      transition: border-color var(--ease), color var(--ease), background var(--ease);
    }
    .soc:hover {
      border-color: rgba(255,255,255,.16);
      color: var(--white);
      background: rgba(255,255,255,.06);
    }
    .soc .ig { color: #e1306c; flex-shrink: 0; }

    /* ── footer ────────────────────────────────────────── */
    footer {
      margin-top: auto; padding-top: 4px;
      font-size: .68rem; color: rgba(255,255,255,.16); text-align: center;
    }
    footer a { color: rgba(255,255,255,.22); transition: color var(--ease); }
    footer a:hover { color: #33c8be; }
  </style>
</head>
