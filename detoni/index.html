<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronaldo Detoni</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="../logo-favicon.png?v=4" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D1928;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
    }

    .stack {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 0;
    }

    .stack img {
      width: 100%;
      height: auto;
      display: block;
    }

    .stack a {
      display: block;
      cursor: pointer;
      transition: opacity .18s ease;
    }

    .stack a:hover { opacity: .88; }
    .stack a:active { opacity: .75; }
  </style>
</head>
<body>
  <div class="stack">

    <img
      src="/detoni/hero-detoni.png"
      alt="Ronaldo Detoni"
      loading="eager"
    />

    <a
      href="https://acelerago.com.br"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Acessar AceleraGO"
    >
      <img src="/detoni/banner-acelerago.png" alt="AceleraGO" loading="lazy" />
    </a>

    <a
      href="https://detonimarketingdigital.com.br"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Acessar Detoni Marketing Digital"
    >
      <img src="/detoni/banner-detoni.png" alt="Detoni Marketing Digital" loading="lazy" />
    </a>

    <a
      href="https://wa.me/5511934619564?text=Ol%C3%A1%2C+vim+pelo+perfil+do+Ronaldo+e+quero+saber+mais+sobre+o+trabalho+de+voc%C3%AAs"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Falar pelo WhatsApp"
    >
      <img src="/detoni/banner-whatsapp.png" alt="Fale com nosso time" loading="lazy" />
    </a>

  </div>
</body>
</html>
